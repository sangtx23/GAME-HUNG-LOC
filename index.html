<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hứng Lộc Pro - Fixed 2026</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 450px; background: #0f051e; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        .hud { position: absolute; top: 40px; left: 5%; width: 90%; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
        .stat-box { background: rgba(0,0,0,0.7); color: #fff; padding: 5px; border-radius: 5px; text-align: center; flex: 1; margin: 0 2px; border: 1px solid #5d41a3; }
        .stat-label { font-size: 8px; color: #b399ff; }
        .stat-value { font-size: 11px; font-weight: bold; color: #ffd700; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #fff; text-align: center; padding: 20px; }
        .btn { background: #7b68ee; border: none; padding: 15px 40px; font-size: 18px; cursor: pointer; border-radius: 30px; color: #fff; font-weight: bold; margin-top: 20px; width: 80%; }
        input { padding: 12px; border-radius: 10px; width: 70%; font-size: 16px; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="hud">
        <div class="stat-box"><div class="stat-label">NGƯỜI CHƠI</div><div id="userNameDisplay" class="stat-value">-</div></div>
        <div class="stat-box"><div class="stat-label">MÀN</div><div id="levelVal" class="stat-value">1</div></div>
        <div class="stat-box"><div class="stat-label">TIỀN LỘC</div><div id="scoreVal" class="stat-value">0đ</div></div>
        <div class="stat-box"><div class="stat-label">THỜI GIAN</div><div id="timerVal" class="stat-value">120s</div></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="startScreen" class="overlay">
        <h1>🧧 HỨNG LỘC PRO 🧧</h1>
        <input type="text" id="playerName" placeholder="Nhập tên của bạn..." maxlength="12">
        <button class="btn" onclick="startGame()">BẮT ĐẦU CHƠI</button>
    </div>

    <div id="winScreen" class="overlay" style="display:none">
        <h2 style="color: #ffd700">XUẤT SẮC! 💰</h2>
        <p id="winMsg"></p>
        <button class="btn" onclick="location.reload()">CHƠI LẠI</button>
    </div>
</div>

<script>
let audioCtx;
let sounds = { bg: null, ando: null, boom: null };
let imagesLoaded = false;

// 1. Tải ảnh
const moneySprite = new Image();
moneySprite.src = 'image_f35639.png';
moneySprite.onload = () => { imagesLoaded = true; };

const spriteMap = { 10000: { col: 0, row: 0 }, 20000: { col: 1, row: 0 }, 50000: { col: 0, row: 1 }, 100000: { col: 1, row: 1 }, 200000: { col: 0, row: 2 }, 500000: { col: 1, row: 2 } };
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const LOGIC_W = 450, LOGIC_H = 750;
canvas.width = LOGIC_W; canvas.height = LOGIC_H;

let playerName = "", score = 0, timeLeft = 120, currentLevel = 1, gameActive = false;
let basket = { x: 175, y: 600, width: 100, height: 80 };
let moneyItems = [], magicDust = [];

// 2. Mở khóa âm thanh (Bắt buộc cho điện thoại)
function unlockAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        sounds.bg = new Audio('nhacnen.mp3');
        sounds.ando = new Audio('ando.mp3');
        sounds.boom = new Audio('boomno.mp3');
        sounds.bg.loop = true;
        sounds.bg.volume = 0.3;
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    sounds.bg.play().catch(e => console.log("Chờ tương tác..."));
}

function startGame() {
    const nameInput = document.getElementById("playerName").value.trim();
    if (!nameInput) return alert("Vui lòng nhập tên!");
    
    playerName = nameInput;
    document.getElementById("userNameDisplay").innerText = playerName;
    
    unlockAudio(); // Mở khóa âm thanh khi chạm nút
    
    document.getElementById("startScreen").style.display = "none";
    gameActive = true;
    requestAnimationFrame(loop);
}

function update() {
    if (!gameActive) return;

    // Tạo tiền rơi
    if (Math.random() < 0.05) {
        let values = [10000, 20000, 50000, 100000, 200000, 500000];
        let v = values[Math.floor(Math.random() * values.length)];
        moneyItems.push({ x: Math.random() * (LOGIC_W - 80), y: -60, val: v, sp: 4 + (currentLevel * 0.2) });
    }

    for (let i = moneyItems.length - 1; i >= 0; i--) {
        let m = moneyItems[i];
        m.y += m.sp;
        
        // Va chạm với giỏ
        if (m.y + 40 > basket.y && m.x + 80 > basket.x && m.x < basket.x + basket.width) {
            score += m.val;
            if (sounds.ando) {
                let s = sounds.ando.cloneNode();
                s.volume = 0.5;
                s.play().catch(()=>{});
            }
            moneyItems.splice(i, 1);
            document.getElementById("scoreVal").innerText = score.toLocaleString() + "đ";
        } else if (m.y > LOGIC_H) {
            moneyItems.splice(i, 1);
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, LOGIC_W, LOGIC_H);
    
    // Vẽ giỏ
    ctx.fillStyle = "#e74c3c";
    ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
    ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 3;
    ctx.strokeRect(basket.x, basket.y, basket.width, basket.height);

    // Vẽ tiền
    moneyItems.forEach(m => {
        const pos = spriteMap[m.val];
        if (imagesLoaded && pos) {
            const sW = moneySprite.width/2, sH = moneySprite.height/3;
            ctx.drawImage(moneySprite, pos.col*sW, pos.row*sH, sW, sH, m.x, m.y, 80, 40);
        } else {
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(m.x, m.y, 70, 35);
            ctx.fillStyle = "white"; ctx.font = "12px Arial";
            ctx.fillText(m.val, m.x + 5, m.y + 20);
        }
    });
}

function loop() {
    if (!gameActive) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

// Xử lý di chuyển
canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = LOGIC_W / rect.width;
    let touchX = (e.touches[0].clientX - rect.left) * scaleX;
    basket.x = Math.max(0, Math.min(LOGIC_W - basket.width, touchX - basket.width/2));
}, {passive: false});

// Đếm ngược
setInterval(() => {
    if (gameActive) {
        timeLeft--;
        document.getElementById("timerVal").innerText = timeLeft + "s";
        if (timeLeft <= 0) {
            gameActive = false;
            alert("Hết thời gian! Điểm của bạn: " + score.toLocaleString() + "đ");
            location.reload();
        }
    }
}, 1000);
</script>
</body>
</html>
