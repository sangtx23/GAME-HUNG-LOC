<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hứng Lộc Pro - Final Fix</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 450px; max-height: 800px; aspect-ratio: 9 / 16; margin: auto; overflow: hidden; background: linear-gradient(to bottom, #0f051e, #1a1033); box-shadow: 0 0 50px rgba(93, 65, 163, 0.5); }
        #gameCanvas { display: block; width: 100%; height: 100%; border: 2px solid #5d41a3; box-sizing: border-box; }
        .hud { position: absolute; top: 40px; left: 5%; width: 90%; display: flex; justify-content: space-between; z-index: 10; border-bottom: 2px solid #7b68ee; padding-bottom: 8px; }
        .stat-box { background: rgba(15, 5, 30, 0.85); color: #fff; padding: 6px; border-radius: 8px; text-align: center; flex: 1; margin: 0 3px; border: 1px solid #5d41a3; }
        .stat-label { font-size: 9px; color: #b399ff; font-weight: bold; text-transform: uppercase; }
        .stat-value { font-size: 12px; font-weight: bold; color: #ffd700; }
        .overlay { position: absolute; inset: 0; background: rgba(5, 2, 15, 0.96); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #b399ff; text-align: center; padding: 20px; transition: 0.3s; }
        .btn { background: linear-gradient(45deg, #7b68ee, #5d41a3); border: none; padding: 12px 30px; font-size: 16px; cursor: pointer; border-radius: 30px; font-weight: bold; color: #fff; margin-top: 10px; box-shadow: 0 4px 15px rgba(123, 104, 238, 0.4); width: 80%; }
        .btn-alt { background: #333; border: 1px solid #7b68ee; }
        input { padding: 14px; border-radius: 12px; border: 2px solid #7b68ee; background: #1a1033; color: #fff; text-align: center; margin-bottom: 15px; width: 85%; font-size: 18px; outline: none; }
        .modal-box { background: rgba(15, 5, 30, 0.9); border: 2px solid #ffd700; border-radius: 20px; padding: 30px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); max-width: 85%; }
        .neon-text { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .magnet-ui { color: #00ffff !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div class="hud">
            <div class="stat-box"><div class="stat-label">NGƯỜI CHƠI</div><div class="stat-value" id="userNameDisplay">-</div></div>
            <div class="stat-box"><div class="stat-label">MÀN</div><div class="stat-value" id="levelVal">1</div></div>
            <div class="stat-box"><div class="stat-label">TIỀN LỘC</div><div class="stat-value" id="scoreVal">0đ</div></div>
            <div class="stat-box"><div class="stat-label">THỜI GIAN</div><div class="stat-value" id="timerVal">120s</div></div>
        </div>
        <canvas id="gameCanvas" width="450" height="750"></canvas>

        <div id="startScreen" class="overlay">
            <h1 style="color: #ffd700;">🧧 HỨNG LỘC PRO 🧧</h1>
            <input type="text" id="playerName" placeholder="Nhập tên của bạn..." maxlength="12">
            <button class="btn" onclick="startGame()">BẮT ĐẦU CHƠI</button>
        </div>

        <div id="winScreen" class="overlay" style="display: none;">
            <h2 id="winTitle" style="color: #ffd700;">XUẤT SẮC!</h2>
            <p id="winMsg"></p>
            <button id="nextBtn" class="btn" onclick="nextLevel()">TIẾP TỤC</button>
        </div>

        <div id="failScreen" class="overlay" style="display: none;">
            <h2 style="color: #ff4d4d;">HẾT THỜI GIAN!</h2>
            <button class="btn" onclick="location.reload()">THỬ LẠI</button>
        </div>
    </div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sounds = { bg: new Audio('nhacnen.mp3'), boom: new Audio('boomno.mp3'), phinto: new Audio('phinto.mp3'), ando: new Audio('ando.mp3') };
sounds.bg.loop = true; sounds.bg.volume = 0.4;

const moneySprite = new Image(); moneySprite.src = 'image_f35639.png'; 
const dragonBg = new Image(); dragonBg.src = 'rong.png';
const vatPhamMoi = new Image(); vatPhamMoi.src = 'vatphammoi.png'; 

const spriteMap = { 10000: { col: 0, row: 0 }, 20000: { col: 1, row: 0 }, 50000: { col: 0, row: 1 }, 100000: { col: 1, row: 1 }, 200000: { col: 0, row: 2 }, 500000: { col: 1, row: 2 } };
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const LOGIC_W = 450, LOGIC_H = 750;

let playerName = localStorage.getItem('player_name') || "";
let currentLevel = 999
let score = 0, timeLeft = 120, gameActive = false;
let basket = { x: 185, y: 550, width: 80, height: 70 };
let moneyItems = [], particles = [], magicDust = [], floatingTexts = [];
let visualScale = 1, targetScale = 1, lastCheckpoint = 0; 
let isTransforming = false, transformTimer = 0, winDelay = 0;
let hasShield = false, magnetActive = false, magnetTimer = 0;
let shieldSpawnTimer = 0, goldSpawnTimer = 0, powerUpSpawnTimer = 0;

function getLevelGoal(level) { return 1500000 + (level - 1) * 1000000; }

function updateHUD() {
    document.getElementById("userNameDisplay").innerText = playerName;
    document.getElementById("levelVal").innerText = currentLevel;
    document.getElementById("scoreVal").innerText = score.toLocaleString() + "đ";
    let t = document.getElementById("timerVal");
    t.innerText = timeLeft + "s";
    if(magnetActive) t.classList.add("magnet-ui"); else t.classList.remove("magnet-ui");
    
    if (score >= getLevelGoal(currentLevel) && gameActive) { 
        gameActive = false; winDelay = 120; 
        localStorage.setItem('saved_level', currentLevel + 1);
    }
}

function startGame() {
    playerName = document.getElementById("playerName").value.trim() || "Người chơi";
    localStorage.setItem('player_name', playerName);
    document.getElementById("startScreen").style.display = "none";
    startGameActual();
}

function startGameActual() {
    document.getElementById("failScreen").style.display = "none";
    document.getElementById("winScreen").style.display = "none";
    score = 0; timeLeft = 120; moneyItems = []; particles = []; floatingTexts = [];
    magnetActive = false; magnetTimer = 0; hasShield = false;
    gameActive = true; if(audioCtx.state === 'suspended') audioCtx.resume();
    sounds.bg.play().catch(()=>{});
    updateHUD();
}

function nextLevel() { currentLevel++; startGameActual(); }

function createFloatingText(x, y, text, color) { floatingTexts.push({ x, y, text, color, life: 1.0, vy: -2 }); }

function update() {
    if (magicDust.length < 30) for (let i = 0; i < 30; i++) magicDust.push({x: Math.random()*LOGIC_W, y: Math.random()*LOGIC_H, s: Math.random()*2, sp: 0.5+Math.random()});
    magicDust.forEach(p => { p.y -= p.sp; if(p.y < 0) p.y = LOGIC_H; });

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        let f = floatingTexts[i]; f.y += f.vy; f.life -= 0.02;
        if (f.life <= 0) floatingTexts.splice(i, 1);
    }

    if (!gameActive) {
        if (winDelay > 0) {
            winDelay--;
            if (winDelay === 1) {
                document.getElementById("winMsg").innerText = `Thu hoạch: ${score.toLocaleString()}đ`;
                document.getElementById("winScreen").style.display = "flex";
            }
        }
        return;
    }

    if (magnetActive && magnetTimer > 0) {
        moneyItems.forEach(m => { if(typeof m.val === 'number' || m.val === "LIXI" || m.val === "GOLD") m.x += (basket.x + basket.width/2 - m.x - 30) * 0.15; });
        magnetTimer--; if(magnetTimer <= 0) magnetActive = false;
    }

    // Tiến trình hiển thị túi
    let progress = Math.min(score / getLevelGoal(currentLevel), 1);
    let currentCheckpoint = progress >= 0.8 ? 0.8 : (progress >= 0.4 ? 0.4 : 0);
    if (currentCheckpoint !== lastCheckpoint) {
        isTransforming = true; transformTimer = 45; lastCheckpoint = currentCheckpoint;
        targetScale = currentCheckpoint === 0.8 ? 1.4 : (currentCheckpoint === 0.4 ? 1.2 : 1.0);
        sounds.phinto.cloneNode(true).play();
    }
    visualScale += (targetScale - visualScale) * 0.05;
    if(isTransforming) { transformTimer--; if(transformTimer<=0) isTransforming=false; }

    // Sinh vật phẩm
    shieldSpawnTimer++; goldSpawnTimer++; powerUpSpawnTimer++;
    if (shieldSpawnTimer >= 1000) { moneyItems.push({ x: Math.random()*380, y: -60, val: "KHIEN", sp: 4 }); shieldSpawnTimer = 0; }
    if (powerUpSpawnTimer >= 1200) { moneyItems.push({ x: Math.random()*380, y: -60, val: Math.random()>0.5?"CLOCK":"MAGNET", sp: 3 }); powerUpSpawnTimer = 0; }

    if (Math.random() < 0.06) {
        let v, r = Math.random();
        let bombChance = (currentLevel === 999 && score >= getLevelGoal(999)) ? 0 : 0.12;
        if(r < bombChance) v = "BOM"; 
        else if(r < bombChance + 0.07) v = "LIXI";
        else v = [10000, 20000, 50000, 100000, 200000, 500000][Math.floor(Math.random() * 6)];
        moneyItems.push({ x: Math.random()*380, y: -60, val: v, sp: 3.5 + Math.min(5, currentLevel*0.001) });
    }

    let bW = basket.width * visualScale, bX = basket.x - (bW - basket.width)/2;
    for (let i = moneyItems.length - 1; i >= 0; i--) {
        let m = moneyItems[i]; m.y += m.sp;
        if (m.y + 40 > basket.y && m.x + 60 > bX && m.x < bX + bW && m.y < basket.y + 30) {
            if (m.val === "BOM") {
                if (hasShield) hasShield = false; else score = Math.max(0, score - 1000000);
                sounds.boom.cloneNode(true).play();
            } else if (m.val === "CLOCK") { timeLeft += 15; sounds.phinto.cloneNode(true).play(); }
            else if (m.val === "MAGNET") { magnetActive = true; magnetTimer = 600; sounds.phinto.cloneNode(true).play(); }
            else if (m.val === "KHIEN") { hasShield = true; sounds.phinto.cloneNode(true).play(); }
            else { 
                let val = (m.val === "LIXI") ? 2000000 : m.val;
                score += val; createFloatingText(m.x, m.y, "+" + val.toLocaleString(), "#2ecc71");
                sounds.ando.cloneNode(true).play();
            }
            moneyItems.splice(i, 1); updateHUD();
        } else if (m.y > LOGIC_H) moneyItems.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0, 0, LOGIC_W, LOGIC_H);
    if (dragonBg.complete) { ctx.globalAlpha = 0.25; ctx.drawImage(dragonBg, 0, 0, LOGIC_W, LOGIC_H); ctx.globalAlpha = 1; }
    
    magicDust.forEach(p => { ctx.fillStyle = "rgba(255,215,0,0.3)"; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); });
    particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); });
    floatingTexts.forEach(f => { ctx.globalAlpha = f.life; ctx.fillStyle = f.color; ctx.font = "bold 18px Arial"; ctx.fillText(f.text, f.x, f.y); });
    ctx.globalAlpha = 1;

    let s = visualScale + Math.sin(Date.now()/200)*0.02;
    let dW = basket.width * s, dH = basket.height * s;
    let dX = basket.x - (dW - basket.width)/2, dY = basket.y - (dH - basket.height)/2;

    // HIỆU ỨNG KHIÊN LÓE SÁNG
    if (hasShield) {
        ctx.save();
        ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4;
        ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff";
        ctx.beginPath(); ctx.arc(dX + dW/2, dY + dH/2, dW * 0.9, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
    }

    // VẼ TÚI LỘC VÀ % 
    ctx.save();
    ctx.beginPath(); ctx.moveTo(dX + 15*s, dY + 20*s); ctx.lineTo(dX + dW - 15*s, dY + 20*s);
    ctx.quadraticCurveTo(dX + dW, dY + 70*s, dX + dW/2, dY + 75*s); ctx.quadraticCurveTo(dX, dY + 70*s, dX + 15*s, dY + 20*s); ctx.clip();
    ctx.fillStyle = "#300"; ctx.fill();
    let fillH = Math.min(score / getLevelGoal(currentLevel), 1) * (55*s);
    ctx.fillStyle = (magnetActive) ? "#00ffff" : "#e74c3c"; 
    ctx.fillRect(dX, (dY + 75*s) - fillH, dW, fillH);
    ctx.restore();
    ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 3*s; ctx.stroke();
    
    // HIỂN THỊ PHẦN TRĂM (%) - KHÔI PHỤC TẠI ĐÂY
    ctx.fillStyle = "white"; ctx.font = `bold ${14*s}px Arial`; ctx.textAlign = "center";
    let pct = Math.floor(Math.min(score / getLevelGoal(currentLevel), 1) * 100);
    ctx.fillText(pct + "%", dX + dW/2, dY + 50*s);

    // Vẽ vật phẩm
    moneyItems.forEach(m => {
        if (m.val === "BOM") ctx.fillText("💣", m.x+20, m.y+40);
        else if (m.val === "KHIEN") ctx.fillText("🛡️", m.x+20, m.y+40);
        else if (m.val === "CLOCK") { if(vatPhamMoi.complete) ctx.drawImage(vatPhamMoi, 0, 0, 100, 100, m.x, m.y, 60, 60); else ctx.fillText("⏱️", m.x+20, m.y+40); }
        else if (m.val === "MAGNET") { if(vatPhamMoi.complete) ctx.drawImage(vatPhamMoi, 100, 0, 100, 100, m.x, m.y, 60, 60); else ctx.fillText("🧲", m.x+20, m.y+40); }
        else if (m.val === "LIXI") ctx.fillText("🧧", m.x+20, m.y+40);
        else {
            const pos = spriteMap[m.val];
            if (moneySprite.complete && pos) {
                const sW = moneySprite.width/2, sH = moneySprite.height/3;
                ctx.drawImage(moneySprite, pos.col*sW, pos.row*sH, sW, sH, m.x, m.y, 80, 40);
            }
        }
    });
}

const updatePos = (clientX) => { if (gameActive) { const rect = canvas.getBoundingClientRect(); basket.x = (clientX - rect.left) * (LOGIC_W / rect.width) - (basket.width * visualScale)/2; } };
canvas.addEventListener("mousemove", (e) => updatePos(e.clientX));
canvas.addEventListener("touchmove", (e) => { e.preventDefault(); updatePos(e.touches[0].clientX); }, {passive: false});

setInterval(() => { if(gameActive) { timeLeft--; updateHUD(); if(timeLeft<=0) { gameActive = false; document.getElementById("failScreen").style.display = "flex"; } } }, 1000);
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
