<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hứng Lộc Pro</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            margin: 0; padding: 0; background: #000; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; 
            font-family: -apple-system, sans-serif;
            touch-action: none; 
        }

        #gameContainer { 
            position: relative; 
            /* Ép container lấy toàn bộ chiều cao hữu dụng của thiết bị */
            width: 100vw; 
            height: 100dvh; /* dvh là đơn vị mới giúp lấy chuẩn chiều cao mobile */
            max-width: 500px;
            background: radial-gradient(circle, #1a1033 0%, #05020f 100%);
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; object-fit: contain; }
        
        /* HUD tránh tai thỏ */
        .hud { 
            position: absolute; 
            top: env(safe-area-inset-top, 15px); 
            left: 10px; right: 10px; 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;
            z-index: 10; 
        }

        .stat-box { 
            background: rgba(15, 5, 30, 0.6); padding: 5px; 
            border-radius: 8px; text-align: center; border: 1px solid rgba(123, 104, 238, 0.3); 
        }
        .stat-label { font-size: 8px; color: #b399ff; font-weight: bold; }
        .stat-value { font-size: 11px; font-weight: bold; color: #ffd700; }

        .overlay { 
            position: absolute; inset: 0; 
            background: rgba(5, 2, 15, 0.98); 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            z-index: 100; color: #b399ff; padding: 20px; 
        }

        .btn { 
            background: linear-gradient(45deg, #7b68ee, #5d41a3); 
            border: none; padding: 16px 0; font-size: 18px; 
            border-radius: 50px; color: #fff; font-weight: bold; 
            margin-top: 15px; width: 85%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        input { 
            padding: 16px; border-radius: 15px; border: 2px solid #7b68ee; 
            background: #1a1033; color: #fff; text-align: center; 
            margin-bottom: 10px; width: 85%; font-size: 20px;
        }

        /* Nút ẩn để kích hoạt Fullscreen */
        .fullscreen-btn {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(255,255,255,0.1); color: white;
            border: none; border-radius: 50%; width: 40px; height: 40px;
            z-index: 1000; font-size: 12px;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <button class="fullscreen-btn" onclick="toggleFullScreen()">⛶</button>

    <div class="hud">
        <div class="stat-box"><div class="stat-label">USER</div><div class="stat-value" id="userNameDisplay">-</div></div>
        <div class="stat-box"><div class="stat-label">MÀN</div><div class="stat-value" id="levelVal">1</div></div>
        <div class="stat-box"><div class="stat-label">LỘC</div><div class="stat-value" id="scoreVal">0đ</div></div>
        <div class="stat-box"><div class="stat-label">TIME</div><div class="stat-value" id="timerVal">120s</div></div>
    </div>

    <canvas id="gameCanvas" width="450" height="750"></canvas>

    <div id="startScreen" class="overlay">
        <h1 style="color: #ffd700;">🧧 HỨNG LỘC PRO 🧧</h1>
        <input type="text" id="playerName" placeholder="Nhập tên..." maxlength="12">
        <button class="btn" onclick="startGame()">BẮT ĐẦU CHƠI</button>
        <p style="font-size: 12px; margin-top: 20px; color: #666;">Mẹo: Nhấn nút ⛶ bên dưới để ẩn thanh địa chỉ</p>
    </div>
</div>

<script>
// --- LOGIC FULLSCREEN ---
function toggleFullScreen() {
    let doc = window.document;
    let docEl = document.getElementById("gameContainer");

    let requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
    let cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

    if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
        requestFullScreen.call(docEl);
    } else {
        cancelFullScreen.call(doc);
    }
}

// --- GIỮ NGUYÊN LOGIC GAME CỦA BẠN TỪ ĐÂY ---
// (Sao chép toàn bộ phần script xử lý game, âm thanh, canvas từ bản cũ của bạn vào đây)
// Lưu ý: Nhớ gọi toggleFullScreen() ngay khi bấm nút "BẮT ĐẦU CHƠI" để game tự tràn màn hình.

function startGame() {
    // Ép tràn màn hình khi bắt đầu (hoạt động tốt trên Android/PC)
    try { toggleFullScreen(); } catch(e) {}
    
    // Logic cũ của bạn
    const inputName = document.getElementById("playerName").value.trim();
    if (!inputName) return alert("Nhập tên nhé!");
    // ... tiếp tục logic của bạn ...
}
</script>
</body>
</html>
