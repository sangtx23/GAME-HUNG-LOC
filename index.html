<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hứng Lộc Pro - Sound Optimized</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; -webkit-user-select: none; user-select: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 450px; max-height: 800px; aspect-ratio: 9 / 16; margin: auto; overflow: hidden; background: linear-gradient(to bottom, #0f051e, #1a1033); }
        #gameCanvas { display: block; width: 100%; height: 100%; border: 2px solid #5d41a3; box-sizing: border-box; }
        .hud { position: absolute; top: 40px; left: 5%; width: 90%; display: flex; justify-content: space-between; z-index: 10; border-bottom: 2px solid #7b68ee; padding-bottom: 5px; pointer-events: none; }
        .stat-box { background: rgba(15, 5, 30, 0.8); color: #fff; padding: 5px; border-radius: 5px; text-align: center; flex: 1; margin: 0 2px; border: 1px solid #5d41a3; }
        .stat-label { font-size: 8px; color: #b399ff; }
        .stat-value { font-size: 11px; font-weight: bold; }
        .overlay { position: absolute; inset: 0; background: rgba(5, 2, 15, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #b399ff; text-align: center; padding: 20px; }
        .btn { background: #7b68ee; border: none; padding: 15px 40px; font-size: 18px; cursor: pointer; border-radius: 30px; font-weight: bold; color: #fff; margin-top: 15px; box-shadow: 0 4px 15px rgba(123, 104, 238, 0.4); }
        input { padding: 12px; border-radius: 10px; border: 2px solid #7b68ee; background: #1a1033; color: #fff; text-align: center; margin-bottom: 15px; width: 80%; font-size: 16px; }
        .btn-reload { margin-top: 20px; background: none; border: none; color: #b399ff; cursor: pointer; font-size: 12px; text-decoration: underline; opacity: 0.7; }
        .btn-reload:active { color: #fff; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div class="hud">
            <div class="stat-box"><div class="stat-label">NGƯỜI CHƠI</div><div class="stat-value" id="userNameDisplay">-</div></div>
            <div class="stat-box"><div class="stat-label">MÀN</div><div class="stat-value" id="levelVal">1</div></div>
            <div class="stat-box"><div class="stat-label">TIỀN LỘC</div><div class="stat-value" id="scoreVal">0đ</div></div>
            <div class="stat-box"><div class="stat-label">THỜI GIAN</div><div class="stat-value" id="timerVal">120s</div></div>
        </div>
        <canvas id="gameCanvas" width="450" height="750"></canvas>
        
        <!-- Màn hình bắt đầu có thêm nút Xoá Cache -->
        <div id="startScreen" class="overlay">
            <h1 style="color: #ffd700; text-shadow: 0 0 10px #f1c40f;">🧧 HỨNG LỘC 🧧</h1>
            <input type="text" id="playerName" placeholder="Nhập tên của bạn..." maxlength="12">
            <button class="btn" onclick="startGame()">BẮT ĐẦU</button>
            <button class="btn-reload" onclick="clearCacheAndReload()">Xoá cache & reload game</button>
        </div>

        <div id="tutorialOverlay" class="overlay" style="display: none;">
            <p>Vuốt để di chuyển túi lộc.<br><b>Ăn Tiền/Lì xì:</b> Nghe tiếng "ting ting"!<br><b>Ăn Bom:</b> -1.000.000đ & Teo nhỏ.</p>
            <button class="btn" onclick="startGameActual()">CHƠI NGAY</button>
        </div>
        <div id="winScreen" class="overlay" style="display: none;">
            <h2 style="color: #ffd700;">CHÚC MỪNG BẠN QUA MÀN! 💰</h2>
            <p id="winMsg"></p>
            <button class="btn" onclick="nextLevel()">SANG MÀN TIẾP THEO</button>
        </div>
        <div id="failScreen" class="overlay" style="display: none;">
            <h2 style="color: #ff4d4d;">HẾT THỜI GIAN!</h2>
            <button class="btn" onclick="location.reload()">CHƠI LẠI</button>
        </div>
    </div>

<script>
// --- CẤU HÌNH HỆ THỐNG ---
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxh2sFzPGUw2Ka60MGECF67Qm1B-XiWgbshRPbGLnc_yNvJ9SQt8BbZ3cKXEM6qFqA/exec";

let savedName = localStorage.getItem('hungLoc_PlayerName');
let playerName = ""; // Tên người chơi hiện tại

// --- KHỞI TẠO NGƯỜI DÙNG & BẢNG ĐIỂM ---
function initUser() {
    if (savedName) {
        document.getElementById('inputArea').style.display = 'none';
        document.getElementById('welcomeArea').style.display = 'block';
        document.getElementById('savedName').innerText = savedName;
        document.getElementById('playerName').value = savedName;
        playerName = savedName;
    }
    renderLeaderboard();
}

function showInputArea() {
    document.getElementById('inputArea').style.display = 'block';
    document.getElementById('welcomeArea').style.display = 'none';
}

async function renderLeaderboard() {
    const list = document.getElementById('leaderboardList');
    list.innerHTML = "<div style='font-size:10px; color:#b399ff;'>Đang tải bảng vàng...</div>";

    try {
        const response = await fetch(SCRIPT_URL);
        const top5 = await response.json();
        
        if (!top5 || top5.length === 0) {
            list.innerHTML = "<div style='font-size:10px; opacity:0.5'>Chưa có kỷ lục nào</div>";
            return;
        }

        list.innerHTML = top5.map((item, index) => `
            <div class="leaderboard-item">
                <span>${index + 1}. ${item.name}</span>
                <span style="color: #ffd700">${Number(item.score).toLocaleString()}đ</span>
            </div>
        `).join('');
    } catch (e) {
        console.error("Lỗi tải xếp hạng:", e);
        list.innerHTML = "<div style='font-size:10px; color:#ff4d4d;'>Lỗi kết nối bảng điểm</div>";
    }
}

function checkAndStart() {
    const inputName = document.getElementById('playerName').value.trim();
    if (!inputName) {
        alert("Chị vui lòng nhập tên để nhận lộc nhé!");
        return;
    }
    playerName = inputName;
    localStorage.setItem('hungLoc_PlayerName', playerName);
    startGame();
}

async function saveScore(finalScore) {
    if (finalScore <= 0) return;
    
    // Gửi lên Google Sheets
    try {
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ name: playerName, score: finalScore })
        });
        console.log("Đã gửi điểm lên hệ thống!");
    } catch (e) {
        console.error("Lỗi gửi điểm:", e);
    }
}

// --- LOGIC GAME ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let bgMusic = new Audio('nhacnen.mp3'); bgMusic.loop = true; bgMusic.volume = 0.4;
let soundBoom = new Audio('boomno.mp3');
let soundScaleUp = new Audio('phinto.mp3');
let soundCollect = new Audio('ando.mp3');

const moneySprite = new Image(); moneySprite.src = 'image_f35639.png'; 
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const LOGIC_W = 450, LOGIC_H = 750;

let currentLevel = 1, score = 0, timeLeft = 120, gameActive = false;
let basket = { x: 185, y: 550, width: 80, height: 70 };
let moneyItems = [], particles = [], magicDust = [], floatingTexts = [];
let visualScale = 1, targetScale = 1, winDelay = 0;

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById("userNameDisplay").innerText = playerName;
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("tutorialOverlay").style.display = "flex";
    bgMusic.play().catch(() => {});
}

function startGameActual() {
    document.getElementById("tutorialOverlay").style.display = "none";
    document.getElementById("failScreen").style.display = "none";
    document.getElementById("winScreen").style.display = "none";
    score = 0; timeLeft = 120; moneyItems = []; particles = []; floatingTexts = [];
    gameActive = true;
    updateHUD();
}

function updateHUD() {
    document.getElementById("levelVal").innerText = currentLevel;
    document.getElementById("scoreVal").innerText = (score < 0 ? 0 : score).toLocaleString() + "đ";
    document.getElementById("timerVal").innerText = Math.max(0, timeLeft) + "s";
    
    // Giả sử mục tiêu mỗi màn là 10.000.000đ (Chị có thể sửa hàm getLevelGoal nếu có)
    let goal = currentLevel * 5000000; 
    if (score >= goal && gameActive) { 
        gameActive = false; 
        saveScore(score); 
        document.getElementById("winScreen").style.display = "flex";
        document.getElementById("winMsg").innerText = "Chị đã thu hoạch được " + score.toLocaleString() + "đ";
    }
}

async function clearCacheAndReload() {
    if (confirm("Xoá dữ liệu người chơi và tải lại?")) {
        localStorage.clear();
        window.location.reload();
    }
}

function nextLevel() { currentLevel++; startGameActual(); }

// --- KHỞI CHẠY ---
initUser();

// Lưu ý: Chị cần giữ lại các hàm update(), draw(), loop() và xử lý sự kiện Touch từ bản cũ 
// Tôi lược bớt ở đây để chị nhìn rõ phần logic mới.
function loop() {
    // update(); 
    // draw();
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
