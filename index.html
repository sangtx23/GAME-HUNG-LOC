<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hứng Lộc Huyền Bí - Final</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 450px; max-height: 800px; aspect-ratio: 9 / 16; margin: auto; overflow: hidden; background: linear-gradient(to bottom, #0f051e, #1a1033); }
        #gameCanvas { display: block; width: 100%; height: 100%; border: 2px solid #5d41a3; box-sizing: border-box; }
        .hud { position: absolute; top: 40px; left: 5%; width: 90%; display: flex; justify-content: space-between; z-index: 10; border-bottom: 2px solid #7b68ee; padding-bottom: 5px; }
        .stat-box { background: rgba(15, 5, 30, 0.8); color: #fff; padding: 5px; border-radius: 5px; text-align: center; flex: 1; margin: 0 2px; border: 1px solid #5d41a3; }
        .stat-label { font-size: 8px; color: #b399ff; }
        .stat-value { font-size: 11px; font-weight: bold; }
        .overlay { position: absolute; inset: 0; background: rgba(5, 2, 15, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #b399ff; text-align: center; padding: 20px; }
        .btn { background: #7b68ee; border: none; padding: 15px 40px; font-size: 18px; cursor: pointer; border-radius: 30px; font-weight: bold; color: #fff; margin-top: 15px; }
        input { padding: 12px; border-radius: 10px; border: 2px solid #7b68ee; background: #1a1033; color: #fff; text-align: center; margin-bottom: 15px; width: 80%; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div class="hud">
            <div class="stat-box"><div class="stat-label">NGƯỜI CHƠI</div><div class="stat-value" id="userNameDisplay">-</div></div>
            <div class="stat-box"><div class="stat-label">MÀN</div><div class="stat-value" id="levelVal">1</div></div>
            <div class="stat-box"><div class="stat-label">TIỀN LỘC</div><div class="stat-value" id="scoreVal">0đ</div></div>
            <div class="stat-box"><div class="stat-label">THỜI GIAN</div><div class="stat-value" id="timerVal">120s</div></div>
        </div>
        <canvas id="gameCanvas" width="450" height="750"></canvas>
        <div id="startScreen" class="overlay">
            <h1>🧧 HỨNG LỘC 🧧</h1>
            <input type="text" id="playerName" placeholder="Nhập tên của bạn..." maxlength="12">
            <button class="btn" onclick="startGame()">BẮT ĐẦU</button>
        </div>
        <div id="tutorialOverlay" class="overlay" style="display: none;">
            <h2>CÁCH CHƠI</h2>
            <p>Vuốt màn hình để hứng tiền.<br>Tránh 💣 mất 1 triệu!</p>
            <button class="btn" onclick="startGameActual()">BẮT ĐẦU NGAY</button>
        </div>
        <div id="winScreen" class="overlay" style="display: none;">
            <h2>ĐẠI CÁT ĐẠI LỢI! 💰</h2>
            <p id="winMsg"></p>
            <button class="btn" onclick="nextLevel()">SANG MÀN TIẾP THEO</button>
        </div>
        <div id="failScreen" class="overlay" style="display: none;">
            <h2 style="color: #ff4d4d;">HẾT THỜI GIAN!</h2>
            <button class="btn" onclick="location.reload()">CHƠI LẠI</button>
        </div>
    </div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let bgMusic = new Audio('nhacnen.mp3'); bgMusic.loop = true; bgMusic.volume = 0.4;
let soundBoom = new Audio('boomno.mp3');
let soundScaleUp = new Audio('phinto.mp3');

const moneySprite = new Image(); moneySprite.src = 'image_f35639.png'; 
const spriteMap = { 10000: { col: 0, row: 0 }, 20000: { col: 1, row: 0 }, 50000: { col: 0, row: 1 }, 100000: { col: 1, row: 1 }, 200000: { col: 0, row: 2 }, 500000: { col: 1, row: 2 } };

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const LOGIC_W = 450, LOGIC_H = 750;

let playerName = "", currentLevel = 1, score = 0, timeLeft = 120, gameActive = false;
let basket = { x: 185, y: 620, width: 80, height: 70 };
let moneyItems = [], particles = [], magicDust = [];
let visualScale = 1, targetScale = 1, lastLevelScale = 1; 
let winDelay = 0, hasShield = false, goldCoinTimer = 0, shieldTimer = 0;

function createParticles(x, y, color, count, speed = 10, isFirework = false) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * speed,
            vy: (Math.random() - 0.5) * speed - (isFirework ? 5 : 2),
            life: 1.0, color: color, size: Math.random() * 4 + 2,
            gravity: 0.1
        });
    }
}

function getLevelGoal(level) { return 15000000 + (level - 1) * 10000000; }

function updateHUD() {
    document.getElementById("levelVal").innerText = currentLevel;
    document.getElementById("scoreVal").innerText = score.toLocaleString() + "đ";
    document.getElementById("timerVal").innerText = timeLeft + "s";
    if (score >= getLevelGoal(currentLevel) && gameActive) { gameActive = false; winDelay = 120; }
}

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    playerName = document.getElementById("playerName").value.trim() || "Người chơi";
    document.getElementById("userNameDisplay").innerText = playerName;
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("tutorialOverlay").style.display = "flex";
    bgMusic.play().catch(() => {});
}

function startGameActual() {
    document.getElementById("tutorialOverlay").style.display = "none";
    document.getElementById("failScreen").style.display = "none";
    document.getElementById("winScreen").style.display = "none";
    score = 0; timeLeft = 120; moneyItems = []; particles = [];
    visualScale = 1; targetScale = 1; lastLevelScale = 1; hasShield = false;
    gameActive = true;
    if (magicDust.length === 0) for (let i = 0; i < 30; i++) magicDust.push({x: Math.random()*LOGIC_W, y: Math.random()*LOGIC_H, s: Math.random()*2, sp: 0.5+Math.random()});
    updateHUD();
}

function nextLevel() { currentLevel++; startGameActual(); }

function update() {
    magicDust.forEach(p => { p.y -= p.sp; if(p.y < 0) p.y = LOGIC_H; });
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    }

    if (!gameActive) {
        if (winDelay > 0) {
            winDelay--;
            if (winDelay % 20 === 0) {
                createParticles(Math.random()*LOGIC_W, Math.random()*(LOGIC_H/2), "#ffd700", 30, 10, true);
                soundBoom.cloneNode(true).play();
            }
            if (winDelay === 1) {
                document.getElementById("winMsg").innerText = `Thu hoạch: ${score.toLocaleString()}đ`;
                document.getElementById("winScreen").style.display = "flex";
            }
        }
        return;
    }

    // Logic phình to túi
    let progress = score / getLevelGoal(currentLevel);
    let currentTargetScale = 1.0;
    if (progress >= 0.8) currentTargetScale = 1.4;
    else if (progress >= 0.4) currentTargetScale = 1.2;

    if (currentTargetScale > lastLevelScale) {
        soundScaleUp.cloneNode(true).play();
        lastLevelScale = currentTargetScale;
    }
    targetScale = currentTargetScale;
    visualScale += (targetScale - visualScale) * 0.1;

    // Sinh vật phẩm
    if (Math.random() < 0.05 + (currentLevel * 0.005)) {
        let v, r = Math.random(), type = "NORMAL";
        if(r < 0.08) v = "BOM"; else if(r < 0.12) { v = "LIXI"; }
        else v = [10000, 20000, 50000, 100000, 200000, 500000][Math.floor(Math.random() * 6)];
        moneyItems.push({ x: Math.random()*(LOGIC_W-80), y: -60, val: v, sp: 3.5 + (currentLevel * 0.2), type: type });
    }

    // Va chạm
    let bW = basket.width * visualScale, bX = basket.x - (bW - basket.width)/2;
    for (let i = moneyItems.length - 1; i >= 0; i--) {
        let m = moneyItems[i]; m.y += m.sp;
        if (m.y + 40 > basket.y && m.x + 60 > bX && m.x < bX + bW) {
            if (m.val === "BOM") {
                score = Math.max(0, score - 1000000);
                soundBoom.cloneNode(true).play();
                createParticles(m.x+40, m.y+20, "#ff0000", 40, 12);
                // Reset lại nấc phình to nếu bị trừ tiền xuống dưới ngưỡng
                let pAfter = score / getLevelGoal(currentLevel);
                if (pAfter < 0.4) lastLevelScale = 1.0;
                else if (pAfter < 0.8) lastLevelScale = 1.2;
            } else {
                score += (m.val === "LIXI" ? 2000000 : m.val);
                createParticles(m.x+40, m.y+20, "#0f0", 15, 5);
            }
            moneyItems.splice(i, 1); updateHUD();
        } else if (m.y > LOGIC_H) moneyItems.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0, 0, LOGIC_W, LOGIC_H);
    magicDust.forEach(p => { ctx.fillStyle = "rgba(255,215,0,0.3)"; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); });
    particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); });
    ctx.globalAlpha = 1;

    let s = visualScale + Math.sin(Date.now()/200)*0.02;
    let dW = basket.width * s, dH = basket.height * s;
    let dX = basket.x - (dW - basket.width)/2, dY = basket.y - (dH - basket.height)/2;

    ctx.save();
    ctx.beginPath(); ctx.moveTo(dX + 15*s, dY + 20*s); ctx.lineTo(dX + dW - 15*s, dY + 20*s);
    ctx.quadraticCurveTo(dX + dW, dY + 70*s, dX + dW/2, dY + 75*s);
    ctx.quadraticCurveTo(dX, dY + 70*s, dX + 15*s, dY + 20*s); ctx.clip();
    ctx.fillStyle = "#300"; ctx.fill();
    let fillH = Math.min(score/getLevelGoal(currentLevel), 1) * (55*s);
    ctx.fillStyle = "#e74c3c"; ctx.fillRect(dX, (dY + 75*s) - fillH, dW, fillH);
    ctx.restore();
    ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 3*s; ctx.stroke();

    moneyItems.forEach(m => {
        if (m.val === "BOM") { ctx.font = "35px Arial"; ctx.textAlign="center"; ctx.fillText("💣", m.x+42, m.y+35); }
        else if (m.val === "LIXI") { ctx.font = "35px Arial"; ctx.textAlign="center"; ctx.fillText("🧧", m.x+42, m.y+35); }
        else if (moneySprite.complete) {
            const pos = spriteMap[m.val];
            if (pos) {
                const sW = moneySprite.width/2, sH = moneySprite.height/3;
                ctx.drawImage(moneySprite, pos.col*sW, pos.row*sH, sW, sH, m.x, m.y, 85, 42);
            }
        }
    });
}

const updatePos = (clientX) => { if (gameActive) { const rect = canvas.getBoundingClientRect(); basket.x = (clientX - rect.left) * (LOGIC_W / rect.width) - basket.width/2; } };
canvas.addEventListener("mousemove", (e) => updatePos(e.clientX));
canvas.addEventListener("touchmove", (e) => { e.preventDefault(); updatePos(e.touches[0].clientX); }, {passive: false});

setInterval(() => { if(gameActive) { timeLeft--; updateHUD(); if(timeLeft<=0) { gameActive = false; document.getElementById("failScreen").style.display = "flex"; } } }, 1000);
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
