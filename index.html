<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hứng Lộc Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hứng Lộc Pro">
    
    <style>
        body { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; font-family: -apple-system, system-ui; 
            touch-action: none; position: fixed; width: 100%; height: 100%;
        }
        #gameContainer { 
            position: relative; width: 100vw; height: 100vh; 
            max-width: 500px; margin: 0 auto; 
            background: radial-gradient(circle, #2a1b52 0%, #0f051e 100%);
        }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        
        /* HUD tối ưu cho Tai thỏ iPhone */
        .hud { 
            position: absolute; top: env(safe-area-inset-top, 20px); 
            left: 10px; right: 10px; display: flex; 
            justify-content: space-between; z-index: 10; pointer-events: none;
        }
        .stat-box { 
            background: rgba(0,0,0,0.6); padding: 5px 10px; 
            border-radius: 10px; border: 1px solid #7b68ee; min-width: 60px;
        }
        .stat-label { font-size: 9px; color: #b399ff; text-align: center; }
        .stat-value { font-size: 13px; color: #ffd700; font-weight: bold; text-align: center; }

        .overlay { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.9); 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 100; color: white; padding: 20px;
        }
        .btn { 
            background: linear-gradient(to right, #7b68ee, #5d41a3); 
            border: none; padding: 15px 40px; border-radius: 50px; 
            color: white; font-weight: bold; font-size: 18px; margin-top: 20px;
        }
        input { 
            padding: 15px; border-radius: 15px; border: 2px solid #7b68ee; 
            background: #1a1033; color: white; width: 80%; text-align: center; font-size: 18px;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="hud">
        <div class="stat-box"><div class="stat-label">MÀN</div><div id="lvl" class="stat-value">1</div></div>
        <div class="stat-box"><div class="stat-label">TIỀN LỘC</div><div id="sc" class="stat-value">0đ</div></div>
        <div class="stat-box"><div class="stat-label">THỜI GIAN</div><div id="tm" class="stat-value">120s</div></div>
    </div>
    <canvas id="c"></canvas>

    <div id="menu" class="overlay">
        <h1 style="color:#ffd700">🧧 HỨNG LỘC 🧧</h1>
        <input type="text" id="pName" placeholder="Nhập tên..." maxlength="10">
        <button class="btn" onclick="start()">CHƠI NGAY</button>
    </div>

    <div id="win" class="overlay" style="display:none">
        <h2 style="color:#ffd700">CHIẾN THẮNG!</h2>
        <p id="res"></p>
        <button class="btn" onclick="next()">MÀN TIẾP</button>
    </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxh2sFzPGUw2Ka60MGECF67Qm1B-XiWgbshRPbGLnc_yNvJ9SQt8BbZ3cKXEM6qFqA/exec";

// Cấu hình logic cố định để không bị méo trên các đời iPhone khác nhau
const LW = 450, LH = 800;
canvas.width = LW; canvas.height = LH;

let score = 0, time = 120, level = 1, active = false;
let basket = { x: 185, y: 650, w: 90, h: 70 };
let items = [], particles = [];

const sprite = new Image();
sprite.src = 'image_f35639.png';
let spriteOk = false;
sprite.onload = () => spriteOk = true;

const sounds = {
    bg: new Audio('nhacnen.mp3'),
    get: new Audio('ando.mp3'),
    boom: new Audio('boomno.mp3')
};
sounds.bg.loop = true;

function start() {
    const name = document.getElementById('pName').value;
    if(!name) return alert("Nhập tên bạn nhé!");
    // Kích hoạt âm thanh cho iOS
    Object.values(sounds).forEach(s => { s.play(); s.pause(); });
    sounds.bg.play();
    document.getElementById('menu').style.display = 'none';
    resetGame();
}

function resetGame() {
    items = []; particles = []; score = 0; time = 120; active = true;
}

function next() {
    level++; document.getElementById('win').style.display = 'none'; resetGame();
}

function update() {
    if(!active) return;

    // Rơi vật phẩm
    if(Math.random() < 0.05 + (level * 0.005)) {
        let type = Math.random() < 0.15 ? 'BOM' : 'TIEN';
        let vals = [10000, 20000, 50000, 100000, 200000, 500000];
        items.push({
            x: Math.random() * (LW - 60),
            y: -50,
            v: type === 'BOM' ? 'BOM' : vals[Math.floor(Math.random()*vals.length)],
            s: 4 + (level * 0.3)
        });
    }

    items.forEach((m, i) => {
        m.y += m.s;
        // Va chạm
        if(m.y > basket.y - 20 && m.x > basket.x - 40 && m.x < basket.x + basket.w) {
            if(m.v === 'BOM') {
                score = Math.max(0, score - 1000000);
                sounds.boom.cloneNode(true).play();
            } else {
                score += m.v;
                sounds.get.cloneNode(true).play();
                // Tạo hiệu ứng hạt lấp lánh khi ăn tiền
                for(let p=0; p<10; p++) particles.push({x: m.x, y: m.y, vx: Math.random()*4-2, vy: Math.random()*4-2, l: 1});
            }
            items.splice(i, 1);
            updateHUD();
        }
        if(m.y > LH) items.splice(i, 1);
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.l -= 0.05;
        if(p.l <= 0) particles.splice(i, 1);
    });

    if(score >= 15000000 + (level-1)*10000000) {
        active = false;
        document.getElementById('res').innerText = "Số tiền: " + score.toLocaleString() + "đ";
        document.getElementById('win').style.display = 'flex';
        // Lưu điểm
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({name: document.getElementById('pName').value, score: score})});
    }
}

function updateHUD() {
    document.getElementById('sc').innerText = score.toLocaleString() + "đ";
    document.getElementById('lvl').innerText = level;
    document.getElementById('tm').innerText = time + "s";
}

function draw() {
    ctx.clearRect(0,0,LW,LH);
    
    // Giỏ (Vẽ hình túi lộc đỏ)
    ctx.fillStyle = "#e74c3c";
    ctx.beginPath();
    ctx.roundRect(basket.x, basket.y, basket.w, basket.h, 15);
    ctx.fill();
    ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 3; ctx.stroke();

    // Vật phẩm
    items.forEach(m => {
        if(m.v === 'BOM') {
            ctx.font = "40px Arial"; ctx.fillText("💣", m.x, m.y);
        } else {
            if(spriteOk) {
                // Giả định sprite 2 cột 3 hàng
                ctx.drawImage(sprite, 0, 0, 100, 50, m.x, m.y, 80, 40);
            } else {
                ctx.fillStyle = "#2ecc71"; ctx.fillRect(m.x, m.y, 70, 35);
            }
        }
    });

    // Hạt hiệu ứng
    particles.forEach(p => {
        ctx.fillStyle = `rgba(255, 215, 0, ${p.l})`;
        ctx.fillRect(p.x, p.y, 4, 4);
    });
}

// Cảm ứng mượt trên iPhone
function move(e) {
    if(!active) return;
    let rect = canvas.getBoundingClientRect();
    let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    basket.x = (x * LW / rect.width) - basket.w/2;
    // Giữ giỏ trong màn hình
    if(basket.x < 0) basket.x = 0;
    if(basket.x > LW - basket.w) basket.x = LW - basket.w;
}
canvas.addEventListener('mousemove', move);
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); }, {passive: false});

setInterval(() => { if(active) { time--; updateHUD(); if(time <= 0) location.reload(); } }, 1000);
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
