<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hứng Lộc Pro - Fixed</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 450px; background: #0f051e; overflow: hidden; }
        #gameCanvas { display: block; width: 100%; height: 100%; border: 1px solid #5d41a3; }
        .hud { position: absolute; top: env(safe-area-inset-top, 20px); left: 5%; width: 90%; display: flex; justify-content: space-between; z-index: 10; }
        .stat-box { background: rgba(15, 5, 30, 0.85); color: #fff; padding: 5px; border-radius: 8px; text-align: center; flex: 1; margin: 0 2px; border: 1px solid #5d41a3; }
        .stat-label { font-size: 8px; color: #b399ff; font-weight: bold; }
        .stat-value { font-size: 11px; font-weight: bold; color: #ffd700; }
        .overlay { position: absolute; inset: 0; background: rgba(5, 2, 15, 0.96); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #fff; text-align: center; padding: 20px; }
        .btn { background: linear-gradient(45deg, #7b68ee, #5d41a3); border: none; padding: 15px; font-size: 16px; color: #fff; border-radius: 30px; font-weight: bold; width: 80%; cursor: pointer; margin-top: 10px; }
        input { padding: 12px; border-radius: 10px; border: 2px solid #7b68ee; background: #1a1033; color: #fff; width: 80%; margin-bottom: 15px; text-align: center; font-size: 18px; outline: none; }
        .leaderboard { width: 90%; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px; margin-top: 15px; max-height: 120px; overflow-y: auto; font-size: 12px; border: 1px solid rgba(123, 104, 238, 0.3); }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="hud">
        <div class="stat-box"><div class="stat-label">NGƯỜI CHƠI</div><div class="stat-value" id="userNameDisplay">-</div></div>
        <div class="stat-box"><div class="stat-label">MÀN</div><div class="stat-value" id="levelVal">1</div></div>
        <div class="stat-box"><div class="stat-label">TIỀN LỘC</div><div class="stat-value" id="scoreVal">0đ</div></div>
        <div class="stat-box"><div class="stat-label">THỜI GIAN</div><div class="stat-value" id="timerVal">120s</div></div>
    </div>

    <canvas id="gameCanvas" width="450" height="750"></canvas>

    <div id="startScreen" class="overlay">
        <h1 style="color: #ffd700">🧧 HỨNG LỘC PRO 🧧</h1>
        <input type="text" id="playerName" placeholder="Nhập tên của bạn..." maxlength="12">
        <button class="btn" onclick="startGame()">BẮT ĐẦU CHƠI</button>
        <div class="leaderboard" id="leaderboardContent">Đang tải xếp hạng...</div>
    </div>

    <div id="winScreen" class="overlay" style="display: none;">
        <h2 style="color: #ffd700">XUẤT SẮC! 💰</h2>
        <p id="winMsg"></p>
        <button class="btn" onclick="nextLevel()">SANG MÀN TIẾP THEO</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxh2sFzPGUw2Ka60MGECF67Qm1B-XiWgbshRPbGLnc_yNvJ9SQt8BbZ3cKXEM6qFqA/exec";
let audioCtx;
let sounds = {};
let imagesLoaded = false;

// Khởi tạo ảnh an toàn
const moneySprite = new Image();
moneySprite.src = 'image_f35639.png'; 
moneySprite.onload = () => { imagesLoaded = true; };

const spriteMap = { 10000: { col: 0, row: 0 }, 20000: { col: 1, row: 0 }, 50000: { col: 0, row: 1 }, 100000: { col: 1, row: 1 }, 200000: { col: 0, row: 2 }, 500000: { col: 1, row: 2 } };
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const LOGIC_W = 450, LOGIC_H = 750;

let playerName = "", score = 0, timeLeft = 120, currentLevel = 1, gameActive = false;
let basket = { x: 185, y: 580, width: 90, height: 70 };
let moneyItems = [], magicDust = [];

function init() {
    loadLeaderboard();
    for (let i = 0; i < 20; i++) magicDust.push({x: Math.random()*LOGIC_W, y: Math.random()*LOGIC_H, s: Math.random()*2, sp: 0.5+Math.random()});
}

function loadLeaderboard() {
    fetch(SCRIPT_URL).then(r => r.json()).then(data => {
        document.getElementById("leaderboardContent").innerHTML = data.map((item, i) => `<div>${i+1}. ${item.name} - ${Number(item.score).toLocaleString()}đ</div>`).join('') || "Chưa có kỷ lục.";
    }).catch(() => { document.getElementById("leaderboardContent").innerText = "Không thể kết nối bảng điểm."; });
}

// Hàm khởi tạo âm thanh chỉ chạy khi có tương tác người dùng
function startAudioSystem() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        sounds = {
            bg: new Audio('nhacnen.mp3'),
            ando: new Audio('ando.mp3'),
            boom: new Audio('boomno.mp3')
        };
        sounds.bg.loop = true;
        sounds.bg.volume = 0.3;
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    sounds.bg.play().catch(e => console.log("Audio play blocked"));
}

function startGame() {
    const nameInput = document.getElementById("playerName").value.trim();
    if (!nameInput) return alert("Vui lòng nhập tên!");
    
    playerName = nameInput;
    document.getElementById("userNameDisplay").innerText = playerName;
    startAudioSystem(); // Kích hoạt âm thanh
    
    document.getElementById("startScreen").style.display = "none";
    gameActive = true;
    loop();
}

function update() {
    if (!gameActive) return;

    magicDust.forEach(p => { p.y -= p.sp; if(p.y < 0) p.y = LOGIC_H; });

    // Tạo tiền rơi
    if (Math.random() < 0.05) {
        let v = [10000, 20000, 50000, 100000, 200000, 500000][Math.floor(Math.random() * 6)];
        moneyItems.push({ x: Math.random()*(LOGIC_W-80), y: -60, val: v, sp: 3.5 + (currentLevel * 0.2) });
    }

    for (let i = moneyItems.length - 1; i >= 0; i--) {
        let m = moneyItems[i]; 
        m.y += m.sp;
        
        // Va chạm
        if (m.y + 40 > basket.y && m.x + 80 > basket.x && m.x < basket.x + basket.width) {
            score += m.val;
            if(sounds.ando) sounds.ando.cloneNode(true).play();
            moneyItems.splice(i, 1);
            document.getElementById("scoreVal").innerText = score.toLocaleString() + "đ";
        } else if (m.y > LOGIC_H) {
            moneyItems.splice(i, 1);
        }
    }
    
    if(score >= (15000000 + (currentLevel-1)*10000000)) {
        gameActive = false;
        document.getElementById("winMsg").innerText = `Chúc mừng ${playerName}! Bạn thu được ${score.toLocaleString()}đ`;
        document.getElementById("winScreen").style.display = "flex";
    }
}

function draw() {
    ctx.clearRect(0, 0, LOGIC_W, LOGIC_H);
    
    // Bụi vàng nền
    magicDust.forEach(p => { ctx.fillStyle = "rgba(255,215,0,0.2)"; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); });
    
    // Vẽ giỏ
    ctx.fillStyle = "#e74c3c";
    ctx.fillRect(basket.x, basket.y, basket.width, basket.height);
    ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 3;
    ctx.strokeRect(basket.x, basket.y, basket.width, basket.height);

    // Vẽ tiền
    moneyItems.forEach(m => {
        const pos = spriteMap[m.val];
        if (imagesLoaded && pos) {
            const sW = moneySprite.width/2, sH = moneySprite.height/3;
            ctx.drawImage(moneySprite, pos.col*sW, pos.row*sH, sW, sH, m.x, m.y, 80, 40);
        } else {
            // Vẽ tạm nếu ảnh chưa tải
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(m.x, m.y, 70, 35);
            ctx.fillStyle = "white"; ctx.font = "12px Arial";
            ctx.fillText(m.val, m.x + 5, m.y + 20);
        }
    });
}

// Cải thiện cảm ứng mượt hơn
canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    let touchX = (e.touches[0].clientX - rect.left) * (LOGIC_W / rect.width);
    basket.x = Math.max(0, Math.min(LOGIC_W - basket.width, touchX - basket.width/2));
}, {passive: false});

function loop() {
    update();
    draw();
    if(gameActive) requestAnimationFrame(loop);
}

setInterval(() => {
    if(gameActive) {
        timeLeft--;
        document.getElementById("timerVal").innerText = timeLeft + "s";
        if(timeLeft <= 0) gameActive = false;
    }
}, 1000);

init();
</script>
</body>
</html>
