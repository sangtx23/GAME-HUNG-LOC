<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Hứng Lộc Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Hứng Lộc Pro">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://sangtx23.github.io/path-to-your-icon.png">

    <style>
        /* Tối ưu hóa giao diện ứng dụng */
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            touch-action: none; 
            /* Chặn trượt trang lò xo trên iPhone */
            position: fixed;
            width: 100%;
        }
        
        #gameContainer { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            max-width: 450px; 
            max-height: 800px; 
            aspect-ratio: 9 / 16; 
            margin: auto; 
            overflow: hidden; 
            background: linear-gradient(to bottom, #0f051e, #1a1033); 
            box-shadow: 0 0 50px rgba(93, 65, 163, 0.5); 
        }

        #gameCanvas { display: block; width: 100%; height: 100%; border: 2px solid #5d41a3; box-sizing: border-box; }
        
        .hud { position: absolute; top: 40px; left: 5%; width: 90%; display: flex; justify-content: space-between; z-index: 10; border-bottom: 2px solid #7b68ee; padding-bottom: 8px; }
        .stat-box { background: rgba(15, 5, 30, 0.85); color: #fff; padding: 6px; border-radius: 8px; text-align: center; flex: 1; margin: 0 3px; border: 1px solid #5d41a3; }
        .stat-label { font-size: 9px; color: #b399ff; font-weight: bold; text-transform: uppercase; }
        .stat-value { font-size: 12px; font-weight: bold; color: #ffd700; }

        .overlay { position: absolute; inset: 0; background: rgba(5, 2, 15, 0.96); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #b399ff; text-align: center; padding: 20px; transition: 0.3s; }
        .btn { background: linear-gradient(45deg, #7b68ee, #5d41a3); border: none; padding: 12px 30px; font-size: 16px; cursor: pointer; border-radius: 30px; font-weight: bold; color: #fff; margin-top: 10px; box-shadow: 0 4px 15px rgba(123, 104, 238, 0.4); width: 80%; }
        .btn-alt { background: #333; border: 1px solid #7b68ee; }
        input { padding: 14px; border-radius: 12px; border: 2px solid #7b68ee; background: #1a1033; color: #fff; text-align: center; margin-bottom: 15px; width: 85%; font-size: 18px; outline: none; }
        
        .leaderboard { width: 90%; background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 15px; margin-top: 20px; border: 1px solid rgba(123, 104, 238, 0.3); max-height: 150px; overflow-y: auto; }
        .lb-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(123, 104, 238, 0.1); font-size: 13px; }
        .btn-util { background: none; border: none; color: #7b68ee; cursor: pointer; font-size: 12px; text-decoration: underline; margin-top: 15px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div class="hud">
            <div class="stat-box"><div class="stat-label">NGƯỜI CHƠI</div><div class="stat-value" id="userNameDisplay">-</div></div>
            <div class="stat-box"><div class="stat-label">MÀN</div><div class="stat-value" id="levelVal">1</div></div>
            <div class="stat-box"><div class="stat-label">TIỀN LỘC</div><div class="stat-value" id="scoreVal">0đ</div></div>
            <div class="stat-box"><div class="stat-label">THỜI GIAN</div><div class="stat-value" id="timerVal">120s</div></div>
        </div>

        <canvas id="gameCanvas" width="450" height="750"></canvas>

        <div id="startScreen" class="overlay">
            <h1 style="color: #ffd700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);">🧧 HỨNG LỘC PRO 🧧</h1>
            <input type="text" id="playerName" placeholder="Nhập tên của bạn..." maxlength="12">
            <button class="btn" onclick="startGame()">BẮT ĐẦU CHƠI</button>
            <div class="leaderboard">
                <div style="color: #ffd700; font-weight: bold; margin-bottom: 10px;">🏆 BẢNG VÀNG LỘC PHÁT</div>
                <div id="leaderboardContent">Đang tải xếp hạng...</div>
            </div>
            <button class="btn-util" onclick="clearData()">Xóa Cache & Tải lại trang</button>
        </div>

        <div id="welcomeBackScreen" class="overlay" style="display: none;">
            <h2 id="welcomeText" style="color: #ffd700;">CHÀO MỪNG QUAY LẠI!</h2>
            <p id="resumeMsg"></p>
            <button class="btn" onclick="resumeGame()">CHƠI TIẾP MÀN CŨ</button>
            <button class="btn btn-alt" onclick="restartNewGame()">CHƠI LẠI TỪ MÀN 1</button>
        </div>

        <div id="tutorialOverlay" class="overlay" style="display: none;">
            <h2>CÁCH CHƠI</h2>
            <p>Di chuyển túi lộc để hứng tiền.<br>Cẩn thận với 💣 bom bạn nhé!</p>
            <button class="btn" onclick="startGameActual()">HIỂU RỒI!</button>
        </div>

        <div id="winScreen" class="overlay" style="display: none;">
            <h2 style="color: #ffd700;">XUẤT SẮC! 💰</h2>
            <p id="winMsg"></p>
            <button class="btn" onclick="nextLevel()">SANG MÀN TIẾP THEO</button>
        </div>

        <div id="failScreen" class="overlay" style="display: none;">
            <h2 style="color: #ff4d4d;">HẾT THỜI GIAN!</h2>
            <button class="btn" onclick="location.reload()">THỬ LẠI</button>
        </div>
    </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxh2sFzPGUw2Ka60MGECF67Qm1B-XiWgbshRPbGLnc_yNvJ9SQt8BbZ3cKXEM6qFqA/exec";

// Khởi tạo AudioContext chỉ khi người dùng chạm vào màn hình (Yêu cầu của iOS)
let audioCtx;
const sounds = {
    bg: new Audio('nhacnen.mp3'),
    boom: new Audio('boomno.mp3'),
    phinto: new Audio('phinto.mp3'),
    ando: new Audio('ando.mp3')
};
sounds.bg.loop = true; sounds.bg.volume = 0.4;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

const moneySprite = new Image(); moneySprite.src = 'image_f35639.png'; 
const spriteMap = { 10000: { col: 0, row: 0 }, 20000: { col: 1, row: 0 }, 50000: { col: 0, row: 1 }, 100000: { col: 1, row: 1 }, 200000: { col: 0, row: 2 }, 500000: { col: 1, row: 2 } };

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const LOGIC_W = 450, LOGIC_H = 750;

let playerName = localStorage.getItem('player_name') || "";
let currentLevel = parseInt(localStorage.getItem('saved_level')) || 1;
let score = 0, timeLeft = 120, gameActive = false;
let basket = { x: 185, y: 550, width: 80, height: 70 };
let moneyItems = [], particles = [], magicDust = [], floatingTexts = [];
let visualScale = 1, targetScale = 1, lastCheckpoint = 0; 
let isTransforming = false, transformTimer = 0, winDelay = 0;
let hasShield = false;
let shieldSpawnTimer = 0, goldSpawnTimer = 0;

function init() {
    loadLeaderboard();
    if (magicDust.length === 0) for (let i = 0; i < 30; i++) magicDust.push({x: Math.random()*LOGIC_W, y: Math.random()*LOGIC_H, s: Math.random()*2, sp: 0.5+Math.random()});

    if (playerName) {
        document.getElementById("startScreen").style.display = "none";
        document.getElementById("welcomeBackScreen").style.display = "flex";
        document.getElementById("welcomeText").innerText = `CHÀO MỪNG ${playerName.toUpperCase()}!`;
        document.getElementById("resumeMsg").innerText = `Lần trước bạn đã thoát ở Màn ${currentLevel}.\nBạn muốn tiếp tục chứ?`;
    }
}

async function loadLeaderboard() {
    const container = document.getElementById("leaderboardContent");
    try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        container.innerHTML = data.map((item, i) => `<div class="lb-item"><span>${i+1}. ${item.name}</span><b style="color:#ffd700">${Number(item.score).toLocaleString()}đ</b></div>`).join('') || "Chưa có kỷ lục nào.";
    } catch (e) { container.innerHTML = "Không thể tải bảng điểm."; }
}

function clearData() { localStorage.clear(); location.reload(); }
function getLevelGoal(level) { return 15000000 + (level - 1) * 10000000; }

function updateHUD() {
    document.getElementById("userNameDisplay").innerText = playerName;
    document.getElementById("levelVal").innerText = currentLevel;
    document.getElementById("scoreVal").innerText = score.toLocaleString() + "đ";
    document.getElementById("timerVal").innerText = timeLeft + "s";
    
    if (score >= getLevelGoal(currentLevel) && gameActive) { 
        gameActive = false; 
        winDelay = 120; 
        localStorage.setItem('saved_level', currentLevel + 1);
        saveScoreToSheet(); 
    }
}

function resumeGame() {
    initAudio();
    document.getElementById("welcomeBackScreen").style.display = "none";
    sounds.bg.play().catch(() => {});
    startGameActual();
}

function restartNewGame() {
    initAudio();
    currentLevel = 1;
    localStorage.setItem('saved_level', 1);
    document.getElementById("welcomeBackScreen").style.display = "none";
    sounds.bg.play().catch(() => {});
    startGameActual();
}

async function saveScoreToSheet() {
    try { fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ name: playerName, score: score }) }); } catch (e) {}
}

function startGame() {
    initAudio();
    const inputName = document.getElementById("playerName").value.trim();
    if (!inputName) return alert("Bạn vui lòng nhập tên nhé!");
    playerName = inputName;
    localStorage.setItem('player_name', playerName);
    localStorage.setItem('saved_level', 1);
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("tutorialOverlay").style.display = "flex";
    sounds.bg.play().catch(() => {});
}

function startGameActual() {
    document.getElementById("tutorialOverlay").style.display = "none";
    document.getElementById("failScreen").style.display = "none";
    document.getElementById("winScreen").style.display = "none";
    score = 0; timeLeft = 120; moneyItems = []; particles = []; floatingTexts = [];
    visual
