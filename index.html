<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hứng Lộc Pro - Mobile Final Fix</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 450px; max-height: 800px; aspect-ratio: 9 / 16; background: #0f051e; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        .hud { position: absolute; top: 40px; left: 5%; width: 90%; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
        .stat-box { background: rgba(0,0,0,0.7); color: #fff; padding: 5px; border-radius: 5px; text-align: center; flex: 1; margin: 0 2px; border: 1px solid #5d41a3; }
        .stat-label { font-size: 8px; color: #b399ff; }
        .stat-value { font-size: 11px; font-weight: bold; color: #ffd700; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #fff; text-align: center; }
        .btn { background: #7b68ee; border: none; padding: 15px 40px; font-size: 18px; cursor: pointer; border-radius: 30px; color: #fff; font-weight: bold; margin-top: 20px; }
        input { padding: 12px; border-radius: 10px; width: 70%; font-size: 16px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="hud">
        <div class="stat-box"><div class="stat-label">NGƯỜI CHƠI</div><div id="userNameDisplay" class="stat-value">-</div></div>
        <div class="stat-box"><div class="stat-label">MÀN</div><div id="levelVal" class="stat-value">1</div></div>
        <div class="stat-box"><div class="stat-label">TIỀN LỘC</div><div id="scoreVal" class="stat-value">0đ</div></div>
        <div class="stat-box"><div class="stat-label">THỜI GIAN</div><div id="timerVal" class="stat-value">120s</div></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="startScreen" class="overlay">
        <h1>🧧 HỨNG LỘC PRO 🧧</h1>
        <input type="text" id="playerName" placeholder="Nhập tên của bạn..." maxlength="12">
        <button class="btn" onclick="masterInit()">BẮT ĐẦU CHƠI</button>
    </div>

    <div id="failScreen" class="overlay" style="display:none">
        <h2 style="color:red">HẾT THỜI GIAN!</h2>
        <button class="btn" onclick="location.reload()">THỬ LẠI</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxh2sFzPGUw2Ka60MGECF67Qm1B-XiWgbshRPbGLnc_yNvJ9SQt8BbZ3cKXEM6qFqA/exec";
let audioCtx;
let sounds = { bg: null, ando: null, boom: null };
let imagesLoaded = false;

// 1. Khởi tạo ảnh với cơ chế fallback (vẽ tạm nếu lỗi)
const moneySprite = new Image();
moneySprite.crossOrigin = "anonymous"; 
moneySprite.src = 'image_f35639.png?v=' + Date.now(); // Tránh cache lỗi
moneySprite.onload = () => { imagesLoaded = true; console.log("Images Ready"); };

const spriteMap = { 10000: { col: 0, row: 0 }, 20000: { col: 1, row: 0 }, 50000: { col: 0, row: 1 }, 100000: { col: 1, row: 1 }, 200000: { col: 0, row: 2 }, 500000: { col: 1, row: 2 } };
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const LOGIC_W = 450, LOGIC_H = 750;

let playerName = "", score = 0, timeLeft = 120, currentLevel = 1, gameActive = false;
let basket = { x: 185, y: 580, width: 90, height: 70 };
let moneyItems = [], magicDust = [];

function init() {
    loadLeaderboard();
    magicDust = [];
    for (let i = 0; i < 20; i++) magicDust.push({x: Math.random()*LOGIC_W, y: Math.random()*LOGIC_H, s: Math.random()*2, sp: 0.5+Math.random()});
}

// 2. Hệ thống âm thanh "Cứng" hơn cho Mobile
function unlockAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        sounds.bg = new Audio('nhacnen.mp3');
        sounds.ando = new Audio('ando.mp3');
        sounds.boom = new Audio('boomno.mp3');
        
        sounds.bg.loop = true;
        sounds.bg.volume = 0.3;
    }
    
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    // Mẹo nhỏ: Phát câm một đoạn để trình duyệt cho phép âm thanh
    sounds.bg.play().then(() => {
        console.log("Audio Playing");
    }).catch(e => {
        console.log("Cần tương tác mạnh hơn để phát nhạc");
    });
}

function startGame() {
    const nameInput = document.getElementById("playerName").value.trim();
    if (!nameInput) return alert("Vui lòng nhập tên!");
    
    playerName = nameInput;
    document.getElementById("userNameDisplay").innerText = playerName;
    
    unlockAudio(); // Gọi ngay lập tức khi click nút
    
    document.getElementById("startScreen").style.display = "none";
    gameActive = true;
    
    // Reset game state
    score = 0; timeLeft = 120; moneyItems = [];
    document.getElementById("scoreVal").innerText = "0đ";
    
    requestAnimationFrame(loop);
}

function update() {
    if (!gameActive) return;

    magicDust.forEach(p => { p.y -= p.sp; if(p.y < 0) p.y = LOGIC_H; });

    if (Math.random() < 0.05) {
        let v = [10000, 20000, 50000, 100000, 200000, 500000][Math.floor(Math.random() * 6)];
        moneyItems.push({ x: Math.random()*(LOGIC_W-80), y: -60, val: v, sp: 3.5 + (currentLevel * 0.2) });
    }

    for (let i = moneyItems.length - 1; i >= 0; i--) {
        let m = moneyItems[i]; 
        m.y += m.sp;
        
        // Kiểm tra va chạm chính xác hơn
        if (m.y + 35 > basket.y && m.x + 60 > basket.x && m.x < basket.x + basket.width) {
            score += m.val;
            if(sounds.ando) {
                let s = sounds.ando.cloneNode();
                s.volume = 0.5;
                s.play().catch(()=>{});
            }
            moneyItems.splice(i, 1);
            document.getElementById("scoreVal").innerText = score.toLocaleString() + "đ";
        } else if (m.y > LOGIC_H) {
            moneyItems.splice(i, 1);
        }
    }
    
    // Check thắng màn
    if(score >= (15000000 + (currentLevel-1)*10000000)) {
        gameActive = false;
        document.getElementById("winMsg").innerText = `Chúc mừng ${playerName}! Bạn thu được ${score.toLocaleString()}đ`;
        document.getElementById("winScreen").style.display = "flex";
    }
}

function draw() {
    ctx.clearRect(0, 0, LOGIC_W, LOGIC_H);
    magicDust.forEach(p => { ctx.fillStyle = "rgba(255,215,0,0.2)"; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); });
    
    // Vẽ giỏ lộc
    ctx.fillStyle = "#e74c3c";
    ctx.beginPath();
    ctx.roundRect(basket.x, basket.y, basket.width, basket.height, 10);
    ctx.fill();
    ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 3;
    ctx.stroke();

    // Vẽ tiền
    moneyItems.forEach(m => {
        const pos = spriteMap[m.val];
        if (imagesLoaded && pos && moneySprite.complete) {
            const sW = moneySprite.width/2, sH = moneySprite.height/3;
            ctx.drawImage(moneySprite, pos.col*sW, pos.row*sH, sW, sH, m.x, m.y, 85, 42);
        } else {
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(m.x, m.y, 70, 35);
            ctx.fillStyle = "white"; ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(m.val/1000 + "k", m.x + 35, m.y + 22);
        }
    });
}

function loop() {
    if (!gameActive) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

// Xử lý touch mượt hơn cho điện thoại
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); }, {passive: false});
canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scaleX = LOGIC_W / rect.width;
    let touchX = (e.touches[0].clientX - rect.left) * scaleX;
    basket.x = Math.max(0, Math.min(LOGIC_W - basket.width, touchX - basket.width/2));
}, {passive: false});

// Đồng hồ đếm ngược
setInterval(() => {
    if(gameActive) {
        timeLeft--;
        document.getElementById("timerVal").innerText = timeLeft + "s";
        if(timeLeft <= 0) {
            gameActive = false;
            alert("Hết thời gian! Bạn đạt được: " + score.toLocaleString() + "đ");
            location.reload();
        }
    }
}, 1000);

init();
</script>
</body>
</html>
