<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hứng Lộc Pro - Phiên Bản Chuyên Nghiệp</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 450px; max-height: 800px; aspect-ratio: 9 / 16; margin: auto; overflow: hidden; background: linear-gradient(to bottom, #0f051e, #1a1033); box-shadow: 0 0 50px rgba(93, 65, 163, 0.5); }
        #gameCanvas { display: block; width: 100%; height: 100%; border: 2px solid #5d41a3; box-sizing: border-box; }
        
        .hud { position: absolute; top: 40px; left: 5%; width: 90%; display: flex; justify-content: space-between; z-index: 10; border-bottom: 2px solid #7b68ee; padding-bottom: 8px; }
        .stat-box { background: rgba(15, 5, 30, 0.85); color: #fff; padding: 6px; border-radius: 8px; text-align: center; flex: 1; margin: 0 3px; border: 1px solid #5d41a3; }
        .stat-label { font-size: 9px; color: #b399ff; font-weight: bold; text-transform: uppercase; }
        .stat-value { font-size: 12px; font-weight: bold; color: #ffd700; }

        .overlay { position: absolute; inset: 0; background: rgba(5, 2, 15, 0.96); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #b399ff; text-align: center; padding: 20px; transition: 0.3s; }
        .btn { background: linear-gradient(45deg, #7b68ee, #5d41a3); border: none; padding: 12px 30px; font-size: 16px; cursor: pointer; border-radius: 30px; font-weight: bold; color: #fff; margin-top: 10px; box-shadow: 0 4px 15px rgba(123, 104, 238, 0.4); width: 80%; }
        .btn-alt { background: #333; border: 1px solid #7b68ee; }
        input { padding: 14px; border-radius: 12px; border: 2px solid #7b68ee; background: #1a1033; color: #fff; text-align: center; margin-bottom: 15px; width: 85%; font-size: 18px; outline: none; }
        
        .leaderboard { width: 90%; background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 15px; margin-top: 20px; border: 1px solid rgba(123, 104, 238, 0.3); max-height: 150px; overflow-y: auto; }
        .lb-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(123, 104, 238, 0.1); font-size: 13px; }
        .btn-util { background: none; border: none; color: #7b68ee; cursor: pointer; font-size: 12px; text-decoration: underline; margin-top: 15px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div class="hud">
            <div class="stat-box"><div class="stat-label">NGƯỜI CHƠI</div><div class="stat-value" id="userNameDisplay">-</div></div>
            <div class="stat-box"><div class="stat-label">MÀN</div><div class="stat-value" id="levelVal">1</div></div>
            <div class="stat-box"><div class="stat-label">TIỀN LỘC</div><div class="stat-value" id="scoreVal">0đ</div></div>
            <div class="stat-box"><div class="stat-label">THỜI GIAN</div><div class="stat-value" id="timerVal">120s</div></div>
        </div>

        <canvas id="gameCanvas" width="450" height="750"></canvas>

        <!-- Màn hình bắt đầu cho người mới -->
        <div id="startScreen" class="overlay">
            <h1 style="color: #ffd700; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);">🧧 HỨNG LỘC PRO 🧧</h1>
            <input type="text" id="playerName" placeholder="Nhập tên của bạn..." maxlength="12">
            <button class="btn" onclick="startGame()">BẮT ĐẦU CHƠI</button>
            <div class="leaderboard">
                <div style="color: #ffd700; font-weight: bold; margin-bottom: 10px;">🏆 BẢNG VÀNG LỘC PHÁT</div>
                <div id="leaderboardContent">Đang tải xếp hạng...</div>
            </div>
            <button class="btn-util" onclick="clearData()">Xóa Cache & Tải lại trang</button>
        </div>

        <!-- Màn hình chào mừng người cũ -->
        <div id="welcomeBackScreen" class="overlay" style="display: none;">
            <h2 id="welcomeText" style="color: #ffd700;">CHÀO MỪNG QUAY LẠI!</h2>
            <p id="resumeMsg"></p>
            <button class="btn" onclick="resumeGame()">CHƠI TIẾP MÀN CŨ</button>
            <button class="btn-util" style="margin-top: 15px;" onclick="backToStart()">KHÔNG, QUAY LẠI MÀN HÌNH CHÍNH</button>
        </div>

        <div id="tutorialOverlay" class="overlay" style="display: none;">
            <h2>CÁCH CHƠI</h2>
            <p>Di chuyển túi lộc để hứng tiền.<br>Cẩn thận với 💣 bom bạn nhé!</p>
            <button class="btn" onclick="startGameActual()">HIỂU RỒI!</button>
        </div>

        <div id="winScreen" class="overlay" style="display: none;">
            <h2 style="color: #ffd700;">XUẤT SẮC! 💰</h2>
            <p id="winMsg"></p>
            <button class="btn" onclick="nextLevel()">SANG MÀN TIẾP THEO</button>
        </div>

        <div id="failScreen" class="overlay" style="display: none;">
            <h2 style="color: #ff4d4d;">HẾT THỜI GIAN!</h2>
            <button class="btn" onclick="location.reload()">THỬ LẠI</button>
        </div>
    </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxh2sFzPGUw2Ka60MGECF67Qm1B-XiWgbshRPbGLnc_yNvJ9SQt8BbZ3cKXEM6qFqA/exec";
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const sounds = {
    bg: new Audio('nhacnen.mp3'),
    boom: new Audio('boomno.mp3'),
    phinto: new Audio('phinto.mp3'),
    ando: new Audio('ando.mp3')
};
sounds.bg.loop = true; sounds.bg.volume = 0.4;

const moneySprite = new Image(); moneySprite.src = 'image_f35639.png'; 
const spriteMap = { 10000: { col: 0, row: 0 }, 20000: { col: 1, row: 0 }, 50000: { col: 0, row: 1 }, 100000: { col: 1, row: 1 }, 200000: { col: 0, row: 2 }, 500000: { col: 1, row: 2 } };

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const LOGIC_W = 450, LOGIC_H = 750;

let playerName = localStorage.getItem('player_name') || "";
let currentLevel = parseInt(localStorage.getItem('saved_level')) || 1;
let score = 0, timeLeft = 120, gameActive = false;
let basket = { x: 185, y: 550, width: 80, height: 70 };
let moneyItems = [], particles = [], magicDust = [], floatingTexts = [];
let visualScale = 1, targetScale = 1, lastCheckpoint = 0; 
let isTransforming = false, transformTimer = 0, winDelay = 0;
let hasShield = false;
let shieldSpawnTimer = 0, goldSpawnTimer = 0;

function init() {
    loadLeaderboard();
    if (magicDust.length === 0) for (let i = 0; i < 30; i++) magicDust.push({x: Math.random()*LOGIC_W, y: Math.random()*LOGIC_H, s: Math.random()*2, sp: 0.5+Math.random()});

    if (playerName) {
        document.getElementById("startScreen").style.display = "none";
        document.getElementById("welcomeBackScreen").style.display = "flex";
        document.getElementById("welcomeText").innerText = `CHÀO MỪNG ${playerName.toUpperCase()}!`;
        document.getElementById("resumeMsg").innerText = `Lần trước bạn đã thoát ở Màn ${currentLevel}.\nBạn muốn tiếp tục chứ?`;
    }
    function backToStart() {
    // Ẩn màn hình chào mừng người cũ
    document.getElementById("welcomeBackScreen").style.display = "none";
    // Hiện lại màn hình nhập tên ban đầu
    document.getElementById("startScreen").style.display = "flex";
   
      
}

async function loadLeaderboard() {
    const container = document.getElementById("leaderboardContent");
    try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        container.innerHTML = data.map((item, i) => `<div class="lb-item"><span>${i+1}. ${item.name}</span><b style="color:#ffd700">${Number(item.score).toLocaleString()}đ</b></div>`).join('') || "Chưa có kỷ lục nào.";
    } catch (e) { container.innerHTML = "Không thể tải bảng điểm."; }
}

function clearData() { localStorage.clear(); location.reload(); }
function getLevelGoal(level) { return 15000000 + (level - 1) * 10000000; }

function updateHUD() {
    document.getElementById("userNameDisplay").innerText = playerName;
    document.getElementById("levelVal").innerText = currentLevel;
    document.getElementById("scoreVal").innerText = score.toLocaleString() + "đ";
    document.getElementById("timerVal").innerText = timeLeft + "s";
    
    if (score >= getLevelGoal(currentLevel) && gameActive) { 
        gameActive = false; 
        winDelay = 120; 
        localStorage.setItem('saved_level', currentLevel + 1);
        saveScoreToSheet(); 
    }
}

function resumeGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById("welcomeBackScreen").style.display = "none";
    sounds.bg.play().catch(() => {});
    startGameActual();
}

function restartNewGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    currentLevel = 1;
    localStorage.setItem('saved_level', 1);
    document.getElementById("welcomeBackScreen").style.display = "none";
    sounds.bg.play().catch(() => {});
    startGameActual();
}

async function saveScoreToSheet() {
    try { fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ name: playerName, score: score }) }); } catch (e) {}
}

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const inputName = document.getElementById("playerName").value.trim();
    if (!inputName) return alert("Bạn vui lòng nhập tên nhé!");
    playerName = inputName;
    localStorage.setItem('player_name', playerName);
    localStorage.setItem('saved_level', 1);
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("tutorialOverlay").style.display = "flex";
    sounds.bg.play().catch(() => {});
}

function startGameActual() {
    document.getElementById("tutorialOverlay").style.display = "none";
    document.getElementById("failScreen").style.display = "none";
    document.getElementById("winScreen").style.display = "none";
    score = 0; timeLeft = 120; moneyItems = []; particles = []; floatingTexts = [];
    visualScale = 1; targetScale = 1; lastCheckpoint = 0; isTransforming = false; hasShield = false;
    shieldSpawnTimer = 0; goldSpawnTimer = 0;
    gameActive = true;
    updateHUD();
}

function nextLevel() { currentLevel++; startGameActual(); }

function createFloatingText(x, y, text, color) {
    floatingTexts.push({ x: x, y: y, text: text, color: color, life: 1.0, vy: -2 });
}

function createParticles(x, y, color, count, speed = 10) {
    for (let i = 0; i < count; i++) {
        particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * speed, vy: (Math.random() - 0.5) * speed - 5, life: 1.0, color: color, size: Math.random() * 4 + 2 });
    }
}

function update() {
    magicDust.forEach(p => { p.y -= p.sp; if(p.y < 0) p.y = LOGIC_H; });
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        let f = floatingTexts[i]; f.y += f.vy; f.life -= 0.02;
        if (f.life <= 0) floatingTexts.splice(i, 1);
    }

    if (!gameActive) {
        if (winDelay > 0) {
            winDelay--;
            if (winDelay % 20 === 0) {
                createParticles(Math.random()*LOGIC_W, Math.random()*LOGIC_H/2, "#ffd700", 30, 10);
                sounds.boom.cloneNode(true).play();
            }
            if (winDelay === 1) {
                document.getElementById("winMsg").innerText = `Tổng thu hoạch: ${score.toLocaleString()}đ`;
                document.getElementById("winScreen").style.display = "flex";
            }
        }
        return;
    }

    if (isTransforming) {
        transformTimer--;
        visualScale += (targetScale - visualScale) * 0.15;
        if (transformTimer <= 0) isTransforming = false;
        return;
    }

    let progress = score / getLevelGoal(currentLevel);
    let currentCheckpoint = progress >= 0.8 ? 0.8 : (progress >= 0.4 ? 0.4 : 0);

    if (currentCheckpoint !== lastCheckpoint) {
        isTransforming = true;
        transformTimer = 45;
        lastCheckpoint = currentCheckpoint;
        targetScale = currentCheckpoint === 0.8 ? 1.4 : (currentCheckpoint === 0.4 ? 1.2 : 1.0);
        
        if (targetScale > visualScale) {
            sounds.phinto.cloneNode(true).play();
            createParticles(basket.x + 40, basket.y + 35, "#ffd700", 35, 12);
        }
    }
    
    visualScale += (targetScale - visualScale) * 0.05;

    shieldSpawnTimer++; goldSpawnTimer++;
    if (shieldSpawnTimer >= 600) { moneyItems.push({ x: Math.random()*(LOGIC_W-80), y: -60, val: "KHIEN", sp: 4 }); shieldSpawnTimer = 0; }
    if (goldSpawnTimer >= 900) { moneyItems.push({ x: Math.random()*(LOGIC_W-80), y: -60, val: "GOLD", sp: 4.5 }); goldSpawnTimer = 0; }

    if (Math.random() < 0.05 + (currentLevel * 0.005)) {
        let v, r = Math.random();
        let bombChance = (currentLevel >= 10) ? 0.25 : 0.12;
        if(r < bombChance) v = "BOM"; 
        else if(r < 0.18) v = "LIXI";
        else v = [10000, 20000, 50000, 100000, 200000, 500000][Math.floor(Math.random() * 6)];
        moneyItems.push({ x: Math.random()*(LOGIC_W-80), y: -60, val: v, sp: 3.5 + (currentLevel * 0.2) });
    }

    let bW = basket.width * visualScale, bX = basket.x - (bW - basket.width)/2;
    for (let i = moneyItems.length - 1; i >= 0; i--) {
        let m = moneyItems[i]; m.y += m.sp;
        if (m.y + 40 > basket.y && m.x + 60 > bX && m.x < bX + bW && m.y < basket.y + 20) {
            if (m.val === "BOM") {
                if (hasShield) {
                    hasShield = false;
                    createFloatingText(m.x, m.y, "🛡️ ĐÃ CHẶN!", "#ffffff");
                    sounds.boom.cloneNode(true).play();
                } else {
                    score -= 1000000; 
                    createFloatingText(m.x + 40, m.y, "-1.000.000", "#ff4d4d");
                    sounds.boom.cloneNode(true).play();
                    createParticles(m.x+40, m.y+20, "#f00", 35, 15);
                }
            } else if (m.val === "KHIEN") {
                hasShield = true;
                createFloatingText(m.x + 40, m.y, "🛡️ KHIÊN", "#00ffff");
                sounds.phinto.cloneNode(true).play();
                createParticles(m.x+40, m.y+20, "#fff", 15);
            } else if (m.val === "GOLD") {
                score += 5000000; createFloatingText(m.x + 40, m.y, "+5.000.000", "#ffd700");
                sounds.phinto.cloneNode(true).play();
                createParticles(m.x+40, m.y+20, "#ffd700", 30, 12);
            } else if (m.val === "LIXI") {
                score += 2000000; createFloatingText(m.x + 40, m.y, "+2.000.000", "#ffd700");
                sounds.ando.cloneNode(true).play();
                createParticles(m.x+40, m.y+20, "#ffd700", 20);
            } else {
                score += m.val; createFloatingText(m.x + 40, m.y, "+" + m.val.toLocaleString(), "#2ecc71");
                sounds.ando.cloneNode(true).play();
                createParticles(m.x+40, m.y+20, "#2ecc71", 15);
            }
            moneyItems.splice(i, 1); updateHUD();
        } else if (m.y > LOGIC_H) moneyItems.splice(i, 1);
    }
}

function draw() {
    ctx.clearRect(0, 0, LOGIC_W, LOGIC_H);
    magicDust.forEach(p => { ctx.fillStyle = "rgba(255,215,0,0.3)"; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); });
    particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); });
    floatingTexts.forEach(f => { ctx.globalAlpha = f.life; ctx.fillStyle = f.color; ctx.font = "bold 18px Arial"; ctx.textAlign = "center"; ctx.fillText(f.text, f.x, f.y); });
    ctx.globalAlpha = 1;

    let s = visualScale + (isTransforming ? Math.sin(Date.now()/30)*0.15 : Math.sin(Date.now()/200)*0.02);
    let dW = basket.width * s, dH = basket.height * s;
    let dX = basket.x - (dW - basket.width)/2, dY = basket.y - (dH - basket.height)/2;
    let centerX = dX + dW/2, centerY = dY + dH/2;

    if (isTransforming) {
        ctx.save();
        ctx.translate(centerX, centerY);
        for (let i = 0; i < 8; i++) {
            ctx.save();
            ctx.rotate((i * Math.PI * 2) / 8); 
            let rayGrad = ctx.createLinearGradient(0, 40 * visualScale, 0, 240 * visualScale);
            let rayColor = (targetScale < visualScale) ? "rgba(255, 77, 77, " : "rgba(255, 215, 0, ";
            rayGrad.addColorStop(0, rayColor + "0.9)");
            rayGrad.addColorStop(1, rayColor + "0)");
            ctx.fillStyle = rayGrad;
            ctx.beginPath(); ctx.moveTo(-5, 40 * visualScale); ctx.lineTo(5, 40 * visualScale); ctx.lineTo(0, 240 * visualScale); ctx.closePath(); ctx.fill();
            ctx.restore();
        }
        ctx.restore();
    }

    if (hasShield) {
        ctx.save();
        let rotation = Date.now() / 800;
        let grad = ctx.createConicGradient(rotation, centerX, centerY);
        grad.addColorStop(0, "rgba(0, 255, 255, 0.5)");
        grad.addColorStop(0.5, "rgba(255, 0, 255, 0.5)");
        grad.addColorStop(1, "rgba(0, 255, 255, 0.5)");
        ctx.strokeStyle = grad; ctx.lineWidth = 6;
        ctx.beginPath(); ctx.arc(centerX, centerY, dW * 0.95, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
    }

    ctx.save();
    ctx.beginPath(); ctx.moveTo(dX + 15*s, dY + 20*s); ctx.lineTo(dX + dW - 15*s, dY + 20*s);
    ctx.quadraticCurveTo(dX + dW, dY + 70*s, dX + dW/2, dY + 75*s);
    ctx.quadraticCurveTo(dX, dY + 70*s, dX + 15*s, dY + 20*s); ctx.clip();
    ctx.fillStyle = "#300"; ctx.fill();
    let fillH = Math.min(Math.max(score, 0)/getLevelGoal(currentLevel), 1) * (55*s);
    ctx.fillStyle = (score <= 0) ? "#555" : "#e74c3c"; 
    ctx.fillRect(dX, (dY + 75*s) - fillH, dW, fillH);
    ctx.restore();
    ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 3*s; ctx.stroke();

    let displayPercent = Math.max(0, Math.floor((score / getLevelGoal(currentLevel)) * 100));
    ctx.fillStyle = "white"; ctx.font = `bold ${14 * s}px Arial`; ctx.textAlign = "center"; ctx.fillText(displayPercent + "%", centerX, dY + 50 * s);

    moneyItems.forEach(m => {
        if (m.val === "BOM") { ctx.font = "35px Arial"; ctx.fillText("💣", m.x+42, m.y+35); }
        else if (m.val === "KHIEN") { ctx.font = "35px Arial"; ctx.fillText("🛡️", m.x+42, m.y+35); }
        else if (m.val === "GOLD") {
            ctx.save();
            let cx = m.x + 42, cy = m.y + 25; let radius = 20;
            let goldGrad = ctx.createRadialGradient(cx-6, cy-6, 2, cx, cy, radius);
            goldGrad.addColorStop(0, "#fffde7"); goldGrad.addColorStop(0.3, "#ffd700"); goldGrad.addColorStop(1, "#8b6508");
            ctx.fillStyle = goldGrad; ctx.beginPath(); ctx.arc(cx, cy, radius-1, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#8b6508"; ctx.font = "bold 20px serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("$", cx, cy + 2);
            ctx.restore();
        }
        else if (m.val === "LIXI") { ctx.font = "35px Arial"; ctx.fillText("🧧", m.x+42, m.y+35); }
        else {
            const pos = spriteMap[m.val];
            if (moneySprite.complete && pos) {
                const sW = moneySprite.width/2, sH = moneySprite.height/3;
                ctx.drawImage(moneySprite, pos.col*sW, pos.row*sH, sW, sH, m.x, m.y, 85, 42);
            }
        }
    });
}

const updatePos = (clientX) => { if (gameActive) { const rect = canvas.getBoundingClientRect(); basket.x = (clientX - rect.left) * (LOGIC_W / rect.width) - (basket.width * visualScale)/2; } };
canvas.addEventListener("mousemove", (e) => updatePos(e.clientX));
canvas.addEventListener("touchmove", (e) => { e.preventDefault(); updatePos(e.touches[0].clientX); }, {passive: false});

setInterval(() => { if(gameActive && !isTransforming) { timeLeft--; updateHUD(); if(timeLeft<=0) { gameActive = false; document.getElementById("failScreen").style.display = "flex"; } } }, 1000);
function loop() { update(); draw(); requestAnimationFrame(loop); }
init();
loop();
</script>
</body>
</html>
