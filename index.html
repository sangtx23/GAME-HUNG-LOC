<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hứng Lộc Pro - Mobile Final Fix</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; max-width: 450px; max-height: 800px; aspect-ratio: 9 / 16; background: #0f051e; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        .hud { position: absolute; top: 40px; left: 5%; width: 90%; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
        .stat-box { background: rgba(0,0,0,0.7); color: #fff; padding: 5px; border-radius: 5px; text-align: center; flex: 1; margin: 0 2px; border: 1px solid #5d41a3; }
        .stat-label { font-size: 8px; color: #b399ff; }
        .stat-value { font-size: 11px; font-weight: bold; color: #ffd700; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: #fff; text-align: center; }
        .btn { background: #7b68ee; border: none; padding: 15px 40px; font-size: 18px; cursor: pointer; border-radius: 30px; color: #fff; font-weight: bold; margin-top: 20px; }
        input { padding: 12px; border-radius: 10px; width: 70%; font-size: 16px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="hud">
        <div class="stat-box"><div class="stat-label">NGƯỜI CHƠI</div><div id="userNameDisplay" class="stat-value">-</div></div>
        <div class="stat-box"><div class="stat-label">MÀN</div><div id="levelVal" class="stat-value">1</div></div>
        <div class="stat-box"><div class="stat-label">TIỀN LỘC</div><div id="scoreVal" class="stat-value">0đ</div></div>
        <div class="stat-box"><div class="stat-label">THỜI GIAN</div><div id="timerVal" class="stat-value">120s</div></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="startScreen" class="overlay">
        <h1>🧧 HỨNG LỘC PRO 🧧</h1>
        <input type="text" id="playerName" placeholder="Nhập tên của bạn..." maxlength="12">
        <button class="btn" onclick="masterInit()">BẮT ĐẦU CHƠI</button>
    </div>

    <div id="failScreen" class="overlay" style="display:none">
        <h2 style="color:red">HẾT THỜI GIAN!</h2>
        <button class="btn" onclick="location.reload()">THỬ LẠI</button>
    </div>
</div>

<script>
// --- CẤU HÌNH TÀI NGUYÊN (Hãy đảm bảo tên file trên GitHub viết thường 100%) ---
const ASSETS = {
    img: 'image_f35639.png',
    bg: 'nhacnen.mp3',
    boom: 'boomno.mp3',
    ando: 'ando.mp3'
};

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 450; canvas.height = 750;

let gameActive = false;
let score = 0, timeLeft = 120, currentLevel = 1;
let basket = { x: 185, y: 600, w: 100, h: 80 };
let items = [];
const moneySprite = new Image();

// Đối tượng quản lý âm thanh cho Mobile
const sounds = {};
let audioUnlocked = false;

function masterInit() {
    // 1. Mở khóa âm thanh (Bắt buộc phải gọi trong hàm onclick trên điện thoại)
    if (!audioUnlocked) {
        Object.keys(ASSETS).forEach(key => {
            if (key !== 'img') {
                sounds[key] = new Audio(ASSETS[key]);
                sounds[key].load();
                // Play & Pause ngay lập tức để xin quyền
                let p = sounds[key].play();
                if (p) p.then(() => { sounds[key].pause(); sounds[key].currentTime = 0; }).catch(()=>{});
            }
        });
        audioUnlocked = true;
    }

    // 2. Kiểm tra tên và bắt đầu
    const name = document.getElementById("playerName").value.trim();
    if (!name) return alert("Bạn vui lòng nhập tên nhé!");
    
    document.getElementById("userNameDisplay").innerText = name;
    document.getElementById("startScreen").style.display = "none";
    
    // Tải ảnh trước khi bắt đầu
    moneySprite.src = ASSETS.img;
    moneySprite.onload = () => {
        sounds.bg.loop = true;
        sounds.bg.play();
        gameActive = true;
        loop();
    };
}

function playSfx(key) {
    if (sounds[key]) {
        let s = sounds[key].cloneNode();
        s.volume = 0.5;
        s.play().catch(()=>{});
    }
}

function update() {
    if (!gameActive) return;

    // Tạo vật phẩm rơi
    if (Math.random() < 0.04) {
        items.push({
            x: Math.random() * 380,
            y: -50,
            type: Math.random() < 0.15 ? 'BOM' : 'MONEY',
            val: [10000, 50000, 100000][Math.floor(Math.random()*3)],
            speed: 4 + currentLevel * 0.5
        });
    }

    items.forEach((m, index) => {
        m.y += m.speed;
        // Va chạm
        if (m.y + 40 > basket.y && m.x + 40 > basket.x && m.x < basket.x + basket.w) {
            if (m.type === 'BOM') {
                score -= 500000;
                playSfx('boom');
            } else {
                score += m.val;
                playSfx('ando');
            }
            items.splice(index, 1);
            updateHUD();
        }
        if (m.y > 750) items.splice(index, 1);
    });
}

function updateHUD() {
    document.getElementById("scoreVal").innerText = score.toLocaleString() + "đ";
    document.getElementById("timerVal").innerText = timeLeft + "s";
}

function draw() {
    ctx.clearRect(0, 0, 450, 750);

    // Vẽ túi lộc (Dùng màu nếu ảnh chưa load, dùng ảnh nếu đã load)
    ctx.fillStyle = "#e74c3c";
    ctx.fillRect(basket.x, basket.y, basket.w, basket.h);
    ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 4;
    ctx.strokeRect(basket.x, basket.y, basket.w, basket.h);

    // Vẽ vật phẩm
    items.forEach(m => {
        if (m.type === 'BOM') {
            ctx.font = "40px Arial"; ctx.fillText("💣", m.x, m.y + 40);
        } else {
            // Nếu có ảnh sprite thì dùng drawImage, không thì vẽ ô vàng
            if (moneySprite.complete && moneySprite.naturalWidth !== 0) {
                ctx.drawImage(moneySprite, 0, 0, 100, 50, m.x, m.y, 80, 40);
            } else {
                ctx.fillStyle = "gold"; ctx.fillRect(m.x, m.y, 60, 30);
                ctx.fillStyle = "black"; ctx.font = "12px Arial";
                ctx.fillText(m.val, m.x + 5, m.y + 20);
            }
        }
    });
}

// Điều khiển di động (Sửa lỗi giật lag)
canvas.addEventListener("touchmove", (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const touchX = (e.touches[0].clientX - rect.left) * (450 / rect.width);
    basket.x = touchX - basket.w / 2;
    // Giới hạn trong màn hình
    if (basket.x < 0) basket.x = 0;
    if (basket.x > 450 - basket.w) basket.x = 450 - basket.w;
}, {passive: false});

// Đếm ngược thời gian
setInterval(() => {
    if (gameActive) {
        timeLeft--; updateHUD();
        if (timeLeft <= 0) {
            gameActive = false;
            document.getElementById("failScreen").style.display = "flex";
        }
    }
}, 1000);

function loop() {
    update();
    draw();
    if (gameActive) requestAnimationFrame(loop);
}
</script>
</body>
</html>
