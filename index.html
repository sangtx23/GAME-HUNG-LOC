<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hứng Lộc Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; background: #000; 
            overflow: hidden; font-family: -apple-system, sans-serif; 
            touch-action: none; position: fixed; width: 100%; height: 100%;
        }
        #gameContainer { 
            position: relative; width: 100vw; height: 100vh; 
            max-width: 500px; margin: 0 auto; 
            background: radial-gradient(circle, #1a1033 0%, #05020f 100%);
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* Fix lỗi đè HUD: Tự động điều chỉnh theo tai thỏ */
        .hud { 
            position: absolute; top: env(safe-area-inset-top, 20px); 
            left: 0; right: 0; padding: 0 10px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            z-index: 10; pointer-events: none;
        }
        .stat-box { 
            background: rgba(20, 10, 40, 0.8); padding: 6px; 
            border-radius: 10px; border: 1px solid #5d41a3;
            text-align: center; backdrop-filter: blur(5px);
        }
        .stat-label { font-size: 9px; color: #b399ff; text-transform: uppercase; margin-bottom: 2px; }
        .stat-value { font-size: 13px; color: #ffd700; font-weight: bold; white-space: nowrap; }

        /* Fix lỗi đè nút: Căn giữa tuyệt đối và giãn cách hợp lý */
        .overlay { 
            position: absolute; inset: 0; background: rgba(5, 2, 15, 0.9); 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 100; color: white; padding: 40px 20px;
        }
        .btn { 
            background: linear-gradient(45deg, #7b68ee, #5d41a3); 
            border: none; padding: 18px 0; width: 85%; max-width: 280px;
            border-radius: 50px; color: white; font-weight: bold; font-size: 18px; 
            margin-top: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        input { 
            padding: 16px; border-radius: 15px; border: 2px solid #7b68ee; 
            background: #1a1033; color: white; width: 85%; max-width: 280px;
            text-align: center; font-size: 18px; margin-bottom: 10px;
        }
        h2 { font-size: 32px; color: #ffd700; margin: 0 0 10px 0; }
        p { font-size: 18px; color: #b399ff; margin: 10px 0; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="hud">
        <div class="stat-box"><div class="stat-label">Màn</div><div id="lvl" class="stat-value">1</div></div>
        <div class="stat-box"><div class="stat-label">Tiền Lộc</div><div id="sc" class="stat-value">0đ</div></div>
        <div class="stat-box"><div class="stat-label">Thời gian</div><div id="tm" class="stat-value">120s</div></div>
    </div>
    <canvas id="c"></canvas>

    <div id="menu" class="overlay">
        <h2>🧧 HỨNG LỘC 🧧</h2>
        <input type="text" id="pName" placeholder="Nhập tên..." maxlength="10">
        <button class="btn" onclick="start()">BẮT ĐẦU</button>
    </div>

    <div id="win" class="overlay" style="display:none">
        <h2>XUẤT SẮC! 💰</h2>
        <p id="res"></p>
        <button class="btn" onclick="next()">SANG MÀN TIẾP THEO</button>
    </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Logic tọa độ chuẩn (9:16)
const LW = 450, LH = 800;
canvas.width = LW; canvas.height = LH;

let score = 0, time = 120, level = 1, active = false;
let basket = { x: 175, y: 650, w: 100, h: 80 };
let items = [], particles = [];

const sprite = new Image();
sprite.src = 'image_f35639.png';
let spriteOk = false;
sprite.onload = () => spriteOk = true;

const sounds = {
    bg: new Audio('nhacnen.mp3'),
    get: new Audio('ando.mp3'),
    boom: new Audio('boomno.mp3')
};
sounds.bg.loop = true;

function start() {
    if(!document.getElementById('pName').value) return alert("Nhập tên nhé!");
    Object.values(sounds).forEach(s => { s.play(); s.pause(); });
    sounds.bg.play().catch(()=>{});
    document.getElementById('menu').style.display = 'none';
    reset();
}

function reset() {
    items = []; particles = []; score = 0; time = 120; active = true;
    updateHUD();
}

function next() {
    level++;
    document.getElementById('win').style.display = 'none';
    reset();
}

function update() {
    if(!active) return;

    if(Math.random() < 0.05 + (level * 0.005)) {
        let isB = Math.random() < 0.15;
        items.push({
            x: Math.random() * (LW - 80),
            y: -60,
            v: isB ? 'B' : [10000, 20000, 50000, 100000, 200000, 500000][Math.floor(Math.random()*6)],
            s: 4 + (level * 0.3)
        });
    }

    for(let i = items.length-1; i >=0; i--) {
        let m = items[i]; m.y += m.s;
        if(m.y + 40 > basket.y && m.x + 80 > basket.x && m.x < basket.x + basket.w) {
            if(m.v === 'B') {
                score = Math.max(0, score - 1000000);
                sounds.boom.cloneNode(true).play();
            } else {
                score += m.v;
                sounds.get.cloneNode(true).play();
            }
            items.splice(i, 1);
            updateHUD();
        } else if(m.y > LH) items.splice(i, 1);
    }

    if(score >= 15000000 + (level-1)*10000000) {
        active = false;
        document.getElementById('res').innerText = "Tổng thu hoạch: " + score.toLocaleString() + "đ";
        document.getElementById('win').style.display = 'flex';
    }
}

function updateHUD() {
    document.getElementById('sc').innerText = score.toLocaleString() + "đ";
    document.getElementById('lvl').innerText = level;
    document.getElementById('tm').innerText = time + "s";
}

function draw() {
    ctx.clearRect(0,0,LW,LH);
    // Vẽ giỏ
    ctx.fillStyle = "#e74c3c";
    ctx.beginPath(); ctx.roundRect(basket.x, basket.y, basket.w, basket.h, 20); ctx.fill();
    ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 4; ctx.stroke();
    
    // Vẽ tiền/bom
    items.forEach(m => {
        if(m.v === 'B') {
            ctx.font = "40px Arial"; ctx.fillText("💣", m.x+20, m.y+40);
        } else {
            if(spriteOk) ctx.drawImage(sprite, 0, 0, sprite.width/2, sprite.height/3, m.x, m.y, 85, 45);
            else { ctx.fillStyle="#ffd700"; ctx.fillRect(m.x, m.y, 80, 40); }
        }
    });
}

function move(e) {
    if(!active) return;
    const r = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    basket.x = Math.max(0, Math.min(LW - basket.w, (x * LW / r.width) - basket.w/2));
}
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); }, {passive: false});

setInterval(() => { if(active) { time--; updateHUD(); if(time<=0) location.reload(); } }, 1000);
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
